<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Личный кабинет — IT-innovation</title>
<style>
:root{
  --brand:#81B446;--brand-d:#6a9338;--dark:#1E2832;--slate:#323C50;
  --mid:#8296AA;--light:#D7DCE6;--bg:#F5FAFA;--red:#DC2626;--red-bg:#fde8e8;
  --nav-bg:#1E2832;--nav-hover:#323C50;
  --sidebar-w:232px;--topbar-h:56px;
  --sh:0 2px 10px rgba(30,40,50,.08),0 1px 3px rgba(30,40,50,.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);font-family:'Vela Sans',system-ui,sans-serif;color:var(--dark);-webkit-font-smoothing:antialiased;}

.layout{display:flex;height:100vh;overflow:hidden;}

/* Sidebar */
.sidebar{width:var(--sidebar-w);flex:none;background:var(--nav-bg);display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.05);}
.s-logo{height:var(--topbar-h);display:flex;align-items:center;padding:0 16px;gap:10px;border-bottom:1px solid rgba(255,255,255,.07);flex:none;text-decoration:none;transition:background .12s;}
.s-logo:hover{background:rgba(255,255,255,.05);}
.logo-mark{width:30px;height:30px;border-radius:8px;flex:none;background:var(--brand);display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:16px;height:16px;fill:#fff;}
.logo-text{font-size:14px;font-weight:700;color:#fff;letter-spacing:-.01em;}
.nav-body{flex:1;overflow-y:auto;padding:10px 8px;}
.nav-group-label{font-size:10.5px;font-weight:600;color:rgba(130,150,170,.7);text-transform:uppercase;letter-spacing:.08em;padding:10px 10px 4px;}
.nav-item{display:flex;align-items:center;gap:9px;height:38px;padding:0 10px;border-radius:7px;font-size:13px;font-weight:500;color:rgba(255,255,255,.6);cursor:pointer;margin-bottom:1px;border-left:2px solid transparent;transition:background .12s,color .12s;text-decoration:none;}
.nav-item:hover{background:var(--nav-hover);color:#fff;}
.nav-item.act{background:rgba(129,180,70,.14);color:#fff;border-left-color:var(--brand);}
.nav-item svg{width:16px;height:16px;flex:none;opacity:.7;}
.s-footer{padding:10px 8px;border-top:1px solid rgba(255,255,255,.06);flex:none;}
.user-row{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;text-decoration:none;}
.user-row:hover{background:var(--nav-hover);}
.user-row.act{background:rgba(129,180,70,.14);}
.avatar{width:30px;height:30px;border-radius:8px;flex:none;background:var(--slate);display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700;color:#fff;}
.u-info{flex:1;min-width:0;}
.u-name{font-size:12.5px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.u-role{font-size:11px;color:var(--mid);}
.logout-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;border-radius:5px;color:rgba(255,255,255,.3);transition:color .15s,background .15s;flex:none;font-size:16px;line-height:1;}
.logout-btn:hover{color:#fff;background:rgba(255,255,255,.08);}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:var(--topbar-h);flex:none;display:flex;align-items:center;padding:0 24px;background:#fff;border-bottom:1px solid var(--light);gap:12px;}
.page-h{font-size:15px;font-weight:700;color:var(--dark);}
.content{flex:1;overflow-y:auto;padding:28px 24px;display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;}

.card{background:#fff;border-radius:10px;box-shadow:var(--sh);padding:22px 20px;width:420px;flex:none;}
.card h2{font-size:14px;font-weight:700;color:var(--dark);margin-bottom:18px;}

.fgrp{display:flex;flex-direction:column;margin-bottom:14px;}
.frow{display:flex;gap:12px;}
.frow .fgrp{flex:1;}
.flbl{font-size:11.5px;font-weight:600;color:var(--slate);display:block;margin-bottom:5px;}
.fc{width:100%;height:38px;padding:0 12px;border:1.5px solid transparent;border-radius:6px;font-size:13px;color:var(--dark);background:rgba(30,40,50,.06);outline:none;transition:background .15s,border-color .15s;font-family:inherit;}
.fc:focus{background:rgba(129,180,70,.07);border-color:rgba(129,180,70,.35);}
.fc::placeholder{color:var(--mid);}

.pw-wrap{position:relative;}
.pw-wrap .fc{padding-right:38px;}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--mid);font-size:14px;line-height:1;padding:0;}
.pw-toggle:hover{color:var(--dark);}

.btn-primary{width:100%;height:38px;border:none;border-radius:6px;background:var(--brand);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;font-family:inherit;display:flex;align-items:center;justify-content:center;}
.btn-primary:hover{background:var(--brand-d);}
.btn-primary:disabled{opacity:.6;cursor:default;}

.form-err{display:none;margin-top:10px;padding:9px 12px;border-radius:6px;background:rgba(220,38,38,.07);border:1px solid rgba(220,38,38,.18);font-size:12.5px;color:var(--red);}
.form-err.show{display:block;}
.form-ok{display:none;margin-top:10px;padding:9px 12px;border-radius:6px;background:rgba(129,180,70,.09);border:1px solid rgba(129,180,70,.28);font-size:12.5px;color:#3a6e2a;}
.form-ok.show{display:block;}

.ro-block{margin-top:6px;border-top:1px solid var(--light);padding-top:14px;}
.ro-item{display:flex;justify-content:space-between;gap:12px;font-size:12.5px;padding:5px 0;}
.ro-key{color:var(--mid);}
.ro-val{color:var(--dark);font-weight:600;text-align:right;}

.pw-hint{font-size:11.5px;color:var(--mid);line-height:1.5;margin-bottom:14px;}
.pw-meta{font-size:12px;color:var(--mid);margin-bottom:16px;}
.pw-meta b{color:var(--slate);}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <a href="/" class="s-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 18 18"><path d="M9 2L2 6v6l7 4 7-4V6z" opacity=".3"/><path d="M9 2l7 4-7 4L2 6z"/></svg>
      </div>
      <span class="logo-text">IT-innovation</span>
    </a>
    <div class="nav-body" id="navBody">
      <div class="nav-group-label">Загрузка...</div>
    </div>
    <div class="s-footer">
      <div class="user-row act" title="Личный кабинет">
        <div class="avatar" id="userAvatar">?</div>
        <div class="u-info">
          <div class="u-name" id="userName">...</div>
          <div class="u-role" id="userRole">...</div>
        </div>
        <button class="logout-btn" title="Выйти" id="logoutBtn">⏻</button>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <span class="page-h">Личный кабинет</span>
    </div>
    <div class="content">

      <!-- Профиль -->
      <div class="card">
        <h2>Профиль</h2>
        <form id="profileForm" autocomplete="off">
          <div class="fgrp">
            <label class="flbl" for="pLast">Фамилия</label>
            <input class="fc" id="pLast" name="last_name" type="text" autocomplete="off">
          </div>
          <div class="frow">
            <div class="fgrp">
              <label class="flbl" for="pFirst">Имя</label>
              <input class="fc" id="pFirst" name="first_name" type="text" autocomplete="off">
            </div>
            <div class="fgrp">
              <label class="flbl" for="pMiddle">Отчество</label>
              <input class="fc" id="pMiddle" name="middle_name" type="text" autocomplete="off">
            </div>
          </div>
          <div class="fgrp">
            <label class="flbl" for="pPosition">Должность</label>
            <input class="fc" id="pPosition" name="position" type="text" autocomplete="off">
          </div>
          <div class="fgrp">
            <label class="flbl" for="pEmail">Email</label>
            <input class="fc" id="pEmail" name="email" type="email" autocomplete="off">
          </div>
          <div class="frow">
            <div class="fgrp">
              <label class="flbl" for="pPhonePers">Личный телефон</label>
              <input class="fc" id="pPhonePers" name="phone_personal" type="text" autocomplete="off">
            </div>
            <div class="fgrp">
              <label class="flbl" for="pPhoneWork">Рабочий телефон</label>
              <input class="fc" id="pPhoneWork" name="phone_work" type="text" autocomplete="off">
            </div>
          </div>
          <div class="fgrp">
            <label class="flbl" for="pExt">Добавочный</label>
            <input class="fc" id="pExt" name="phone_extension" type="text" autocomplete="off">
          </div>
          <button class="btn-primary" type="submit" id="profileBtn">Сохранить</button>
          <div class="form-err" id="profileErr"></div>
          <div class="form-ok" id="profileOk"></div>
        </form>

        <div class="ro-block" id="roBlock"></div>
      </div>

      <!-- Безопасность -->
      <div class="card">
        <h2>Безопасность</h2>
        <div class="pw-meta" id="pwMeta">Пароль менялся: <b>—</b></div>
        <form id="pwForm" autocomplete="off">
          <div class="fgrp">
            <label class="flbl" for="curPw">Текущий пароль</label>
            <div class="pw-wrap">
              <input class="fc" id="curPw" name="current_password" type="password" autocomplete="current-password" required>
              <button type="button" class="pw-toggle" data-for="curPw">👁</button>
            </div>
          </div>
          <div class="fgrp">
            <label class="flbl" for="newPw">Новый пароль</label>
            <div class="pw-wrap">
              <input class="fc" id="newPw" name="new_password" type="password" autocomplete="new-password" required>
              <button type="button" class="pw-toggle" data-for="newPw">👁</button>
            </div>
          </div>
          <div class="fgrp">
            <label class="flbl" for="newPw2">Повторите новый пароль</label>
            <div class="pw-wrap">
              <input class="fc" id="newPw2" name="new_password2" type="password" autocomplete="new-password" required>
              <button type="button" class="pw-toggle" data-for="newPw2">👁</button>
            </div>
          </div>
          <p class="pw-hint">Минимум 8 символов, заглавная и строчная буквы, спецсимвол. Не должен совпадать с текущим.</p>
          <button class="btn-primary" type="submit" id="pwBtn">Сменить пароль</button>
          <div class="form-err" id="pwErr"></div>
          <div class="form-ok" id="pwOk"></div>
        </form>
      </div>

    </div>
  </div>
</div>

<script>
const MODULE_URLS = {sales:'/vendors', client_rotation:'/client-rotation'};
const STAFF_ICON = `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M5 7a2.5 2.5 0 100-5 2.5 2.5 0 000 5zm-4 7a4 4 0 018 0H1zm9-7a2 2 0 100-4 2 2 0 000 4zm1 1a3 3 0 012.83 2H10a5 5 0 00-.8-2.75A3 3 0 0111 8z"/></svg>`;
function defaultIcon(){return `<svg viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="2" width="12" height="12" rx="2" opacity=".3"/><rect x="5" y="5" width="6" height="1.5" rx=".75"/><rect x="5" y="8" width="6" height="1.5" rx=".75"/></svg>`;}

function esc(s){const d=document.createElement('div');d.textContent=s??'';return d.innerHTML;}
function formatDate(iso){try{return new Date(iso).toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'});}catch{return iso;}}

const EDITABLE = ['last_name','first_name','middle_name','position','email','phone_personal','phone_work','phone_extension'];
const FIELD_INPUT = {
  last_name:'pLast', first_name:'pFirst', middle_name:'pMiddle', position:'pPosition',
  email:'pEmail', phone_personal:'pPhonePers', phone_work:'pPhoneWork', phone_extension:'pExt',
};

function fillProfile(p){
  for(const f of EDITABLE){
    document.getElementById(FIELD_INPUT[f]).value = p[f] || '';
  }
  // Если карточки нет — править нечего, блокируем форму.
  if(!p.has_employee){
    document.getElementById('profileBtn').disabled = true;
    document.querySelectorAll('#profileForm .fc').forEach(el=>el.disabled=true);
    const err = document.getElementById('profileErr');
    err.textContent = 'Профиль не привязан к карточке сотрудника. Обратитесь к администратору.';
    err.classList.add('show');
  }
  // Read-only блок
  const ro = document.getElementById('roBlock');
  const items = [
    ['Логин', p.login],
    ['Доменное имя', p.domain_name],
    ['Роли', p.roles.length ? p.roles.join(', ') : 'нет роли'],
    ['Руководитель', p.manager_name],
    ['Статус', p.is_active ? 'Активен' : 'Отключён'],
  ];
  ro.innerHTML = items
    .filter(([,v])=>v)
    .map(([k,v])=>`<div class="ro-item"><span class="ro-key">${esc(k)}</span><span class="ro-val">${esc(v)}</span></div>`)
    .join('');
  // Пароль
  document.getElementById('pwMeta').innerHTML =
    'Пароль менялся: <b>' + (p.password_changed_at ? formatDate(p.password_changed_at) : '—') + '</b>';
}

async function loadProfile(){
  const res = await fetch('/api/me/profile');
  if(!res.ok){ window.location.href='/login'; return null; }
  const p = await res.json();
  document.getElementById('userName').textContent = p.full_name || p.login;
  document.getElementById('userAvatar').textContent = (p.full_name || p.login).slice(0,2).toUpperCase();
  document.getElementById('userRole').textContent = p.roles.join(', ') || 'нет роли';
  fillProfile(p);
  return p;
}

async function buildNav(){
  const navRes = await fetch('/nav');
  if(!navRes.ok) return;
  const nav = await navRes.json();
  const navBody = document.getElementById('navBody');
  navBody.innerHTML='';
  if(nav.modules.length){
    const lbl=document.createElement('div');lbl.className='nav-group-label';lbl.textContent='Модули';
    navBody.appendChild(lbl);
    nav.modules.forEach(m=>{
      const url=MODULE_URLS[m.code];
      const el=document.createElement(url?'a':'div');
      el.className='nav-item';
      if(url){el.href=url;}
      el.innerHTML=(defaultIcon())+`<span>${esc(m.name)}</span>`;
      navBody.appendChild(el);
    });
  }
  const staffItem=document.createElement('a');
  staffItem.className='nav-item';
  staffItem.href='/employees';
  staffItem.innerHTML=STAFF_ICON+'<span>Сотрудники</span>';
  navBody.appendChild(staffItem);
}

// Сохранение профиля
document.getElementById('profileForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const btn=document.getElementById('profileBtn');
  const errEl=document.getElementById('profileErr');
  const okEl=document.getElementById('profileOk');
  errEl.classList.remove('show'); okEl.classList.remove('show');
  btn.disabled=true; btn.textContent='Сохраняю...';

  const body={};
  for(const f of EDITABLE){ body[f]=document.getElementById(FIELD_INPUT[f]).value.trim(); }

  try{
    const res=await fetch('/api/me/profile',{
      method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body),
    });
    const data=await res.json().catch(()=>({}));
    if(!res.ok){
      errEl.textContent=data.detail||'Ошибка сохранения'; errEl.classList.add('show');
    }else{
      okEl.textContent='Профиль сохранён.'; okEl.classList.add('show');
      fillProfile(data);
      document.getElementById('userName').textContent=data.full_name||data.login;
    }
  }catch{
    errEl.textContent='Нет связи с сервером'; errEl.classList.add('show');
  }finally{
    btn.disabled=false; btn.textContent='Сохранить';
  }
});

// Смена пароля
document.getElementById('pwForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const btn=document.getElementById('pwBtn');
  const errEl=document.getElementById('pwErr');
  const okEl=document.getElementById('pwOk');
  errEl.classList.remove('show'); okEl.classList.remove('show');

  const current=document.getElementById('curPw').value;
  const next=document.getElementById('newPw').value;
  const next2=document.getElementById('newPw2').value;
  if(next!==next2){
    errEl.textContent='Новый пароль и повтор не совпадают'; errEl.classList.add('show'); return;
  }

  btn.disabled=true; btn.textContent='Меняю...';
  try{
    const res=await fetch('/api/me/change-password',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({current_password:current, new_password:next}),
    });
    if(res.status===204){
      okEl.textContent='Пароль изменён.'; okEl.classList.add('show');
      e.target.reset();
      loadProfile();  // обновим дату последней смены
    }else{
      const data=await res.json().catch(()=>({}));
      errEl.textContent=data.detail||'Ошибка смены пароля'; errEl.classList.add('show');
    }
  }catch{
    errEl.textContent='Нет связи с сервером'; errEl.classList.add('show');
  }finally{
    btn.disabled=false; btn.textContent='Сменить пароль';
  }
});

// Показ/скрытие паролей
document.querySelectorAll('.pw-toggle').forEach(b=>{
  b.addEventListener('click',()=>{
    const inp=document.getElementById(b.dataset.for);
    inp.type = inp.type==='password' ? 'text' : 'password';
  });
});

document.getElementById('logoutBtn').addEventListener('click', async (e)=>{
  e.preventDefault(); e.stopPropagation();
  await fetch('/logout',{method:'POST'});
  window.location.href='/login';
});

async function init(){
  const meRes=await fetch('/me');
  if(!meRes.ok){ window.location.href='/login'; return; }
  const me=await meRes.json();
  if(me.must_change_password){ window.location.href='/login'; return; }
  await buildNav();
  await loadProfile();
}
init();
</script>
</body>
</html>
