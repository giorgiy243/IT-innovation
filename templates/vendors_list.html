<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вендоры - IT-innovation</title>
<style>
:root{
  --brand:#81B446;--brand-d:#6a9338;--dark:#1E2832;--slate:#323C50;
  --mid:#8296AA;--light:#D7DCE6;--bg:#F5FAFA;
  --nav-bg:#1E2832;--nav-hover:#323C50;
  --sidebar-w:232px;--topbar-h:56px;
  --sh:0 2px 10px rgba(30,40,50,.08),0 1px 3px rgba(30,40,50,.05);
  --sh-hover:0 8px 28px rgba(30,40,50,.13),0 2px 6px rgba(30,40,50,.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);font-family:'Vela Sans',system-ui,sans-serif;color:var(--dark);-webkit-font-smoothing:antialiased;}

.layout{display:flex;height:100vh;overflow:hidden;}

/* Sidebar */
.sidebar{width:var(--sidebar-w);flex:none;background:var(--nav-bg);display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.05);}
.s-logo{height:var(--topbar-h);display:flex;align-items:center;padding:0 16px;gap:10px;border-bottom:1px solid rgba(255,255,255,.07);flex:none;text-decoration:none;transition:background .12s;}
.s-logo:hover{background:rgba(255,255,255,.05);}
.logo-mark{width:30px;height:30px;border-radius:8px;flex:none;background:var(--brand);display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:16px;height:16px;fill:#fff;}
.logo-text{font-size:14px;font-weight:700;color:#fff;letter-spacing:-.01em;}
.nav-body{flex:1;overflow-y:auto;padding:10px 8px;}
.nav-group-label{font-size:10.5px;font-weight:600;color:rgba(130,150,170,.7);text-transform:uppercase;letter-spacing:.08em;padding:10px 10px 4px;}
.nav-item{display:flex;align-items:center;gap:9px;height:38px;padding:0 10px;border-radius:7px;font-size:13px;font-weight:500;color:rgba(255,255,255,.6);cursor:pointer;margin-bottom:1px;border-left:2px solid transparent;transition:background .12s,color .12s;text-decoration:none;}
.nav-item:hover{background:var(--nav-hover);color:#fff;}
.nav-item.act{background:rgba(129,180,70,.14);color:#fff;border-left-color:var(--brand);}
.nav-item svg{width:16px;height:16px;flex:none;opacity:.7;}
.nav-item.act svg{opacity:1;}
.s-footer{padding:10px 8px;border-top:1px solid rgba(255,255,255,.06);flex:none;}
.user-row{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;}
.user-row:hover{background:var(--nav-hover);}
.avatar{width:30px;height:30px;border-radius:8px;flex:none;background:var(--slate);display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700;color:#fff;}
.u-info{flex:1;min-width:0;}
.u-name{font-size:12.5px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.u-role{font-size:11px;color:var(--mid);}
.logout-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;border-radius:5px;color:rgba(255,255,255,.3);transition:color .15s,background .15s;flex:none;font-size:16px;line-height:1;}
.logout-btn:hover{color:#fff;background:rgba(255,255,255,.08);}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:var(--topbar-h);flex:none;display:flex;align-items:center;padding:0 24px;background:#fff;border-bottom:1px solid var(--light);gap:12px;}
.page-h{font-size:15px;font-weight:700;color:var(--dark);flex:1;}
.count-badge{font-size:12px;color:var(--mid);background:var(--bg);border:1px solid var(--light);border-radius:20px;padding:2px 10px;}
.content{flex:1;overflow-y:auto;padding:20px 24px;}

/* Filters */
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.filter-input{height:34px;border:1px solid var(--light);border-radius:7px;padding:0 10px;font-size:13px;font-family:inherit;color:var(--dark);background:#fff;outline:none;width:220px;}
.filter-input:focus{border-color:var(--brand);}
.filter-select{height:34px;border:1px solid var(--light);border-radius:7px;padding:0 8px;font-size:13px;font-family:inherit;color:var(--dark);background:#fff;outline:none;cursor:pointer;}
.filter-select:focus{border-color:var(--brand);}
.btn-reset{height:34px;padding:0 14px;border:1px solid var(--light);border-radius:7px;font-size:13px;font-family:inherit;color:var(--mid);background:#fff;cursor:pointer;transition:border-color .12s,color .12s;display:inline-flex;align-items:center;justify-content:center;}
.btn-reset:hover{border-color:var(--mid);color:var(--dark);}

/* Cards grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:12px;}

/* Vendor card — гибрид В+Б: левая градиентная полоса + контент */
.cl-card{
  background:#fff;border:none;border-radius:10px;overflow:hidden;
  box-shadow:var(--sh);transition:transform .18s ease,box-shadow .18s ease;
  display:flex;min-height:110px;cursor:pointer;
}
.cl-card:hover{transform:translateY(-3px);box-shadow:var(--sh-hover);}

/* Градиент полосы по статусу */
.cl-card.s-active .cl-stripe{background:linear-gradient(180deg,#1f3d18,#3a6e2a);}
.cl-card.s-suspended .cl-stripe{background:linear-gradient(180deg,#3d2600,#7a4a00);}
.cl-card.s-revoked .cl-stripe,
.cl-card.s-deauth .cl-stripe,
.cl-card.s-closed .cl-stripe,
.cl-card.s-overdue .cl-stripe{background:linear-gradient(180deg,#3d1010,#7a2020);}
.cl-card.s-none .cl-stripe,
.cl-card.s-unknown .cl-stripe{background:linear-gradient(180deg,#2a3040,#3a4050);}

.cl-stripe{
  width:52px;flex:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;padding:12px 0;
  background:linear-gradient(180deg,#2a3040,#3a4050);
}
.cl-stripe-icon{
  width:30px;height:30px;border-radius:8px;
  background:rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
}
.cl-stripe-lbl{
  font-size:9px;font-weight:700;color:rgba(255,255,255,.45);
  text-transform:uppercase;letter-spacing:.1em;
  writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);
}

/* Контентный блок карточки */
.cl-content{flex:1;min-width:0;padding:14px;display:flex;flex-direction:column;}
.cl-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;}
.cl-hd-left{min-width:0;flex:1;overflow:hidden;}
.cl-name{font-size:13.5px;font-weight:700;color:var(--dark);line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cl-sub{font-size:12px;color:var(--mid);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cl-badge{flex-shrink:0;white-space:nowrap;align-self:flex-start;}
.cl-ft{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:auto;padding-top:8px;border-top:1px solid var(--bg);}
.cl-meta{font-size:11.5px;color:var(--mid);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cl-meta.expired{color:#991b1b;font-weight:600;}

/* Status badges */
.badge{display:inline-block;font-size:11px;font-weight:600;border-radius:5px;padding:2px 8px;white-space:nowrap;}
.badge-active{background:#e8f5d9;color:#4a7a1e;}
.badge-suspended{background:#fef9c3;color:#854d0e;}
.badge-revoked,.badge-deauth,.badge-closed,.badge-overdue{background:#fde8e8;color:#991b1b;}
.badge-none{background:#eef2f7;color:#64748b;}
.badge-unknown{background:#f1f5f9;color:#94a3b8;}
.warn-icon{color:#d97706;font-weight:700;margin-right:2px;}

.empty-state{padding:48px;text-align:center;color:var(--mid);font-size:14px;}
.scroll-top{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--slate);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(30,40,50,.3);opacity:0;pointer-events:none;transition:opacity .2s,transform .18s,background .15s;z-index:999;}
.scroll-top.visible{opacity:1;pointer-events:auto;}
.scroll-top:hover{background:var(--dark);transform:translateY(-2px);box-shadow:0 6px 20px rgba(30,40,50,.4);}
.scroll-top svg{width:18px;height:18px;stroke:#fff;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
/* Chip типа компании */
.type-chip{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;margin-left:5px;vertical-align:middle;}
.t-vendor{background:rgba(129,180,70,.14);color:#3a6320;}
.t-distributor{background:rgba(30,74,168,.1);color:#1e3fa8;}
.t-partner{background:rgba(120,85,0,.1);color:#7a5500;}
/* Кнопка добавления */
.btn-add{height:34px;padding:0 16px;border-radius:7px;font-size:13px;font-family:inherit;font-weight:600;color:#fff;background:var(--brand);border:none;cursor:pointer;margin-left:auto;display:none;align-items:center;justify-content:center;gap:6px;transition:background .12s;}
.btn-add:hover{background:var(--brand-d);}
/* Модальное окно */
.modal-overlay{position:fixed;inset:0;background:rgba(30,40,50,.55);display:none;align-items:center;justify-content:center;z-index:1000;}
.modal-overlay.open{display:flex;}
.modal-box{background:#fff;border-radius:12px;width:580px;max-width:96vw;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(30,40,50,.28);}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--light);display:flex;align-items:center;flex:none;}
.modal-title{font-size:15px;font-weight:700;color:var(--dark);flex:1;}
.modal-close{width:30px;height:30px;border:none;background:transparent;cursor:pointer;border-radius:6px;font-size:18px;color:var(--mid);display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s;line-height:1;}
.modal-close:hover{background:var(--bg);color:var(--dark);}
.modal-body{flex:1;overflow-y:auto;padding:20px;}
.modal-foot{padding:14px 20px;border-top:1px solid var(--light);display:flex;align-items:center;justify-content:flex-end;gap:10px;flex:none;}
.form-section{margin-bottom:18px;}
.form-section-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--mid);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bg);}
.form-group{margin-bottom:12px;}
.form-row{display:flex;gap:12px;}
.form-row .form-group{flex:1;margin-bottom:0;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--slate);margin-bottom:4px;}
.req{color:var(--brand);font-weight:700;}
.form-inp{width:100%;background:rgba(50,60,80,.06);border:1.5px solid transparent;border-radius:7px;padding:8px 12px;font-size:13px;font-family:inherit;color:var(--dark);outline:none;transition:border-color .15s,background .15s;}
.form-inp:focus{border-color:var(--brand);background:#fff;}
.form-inp.invalid{border-color:#D97706!important;background:#fffbf0;}
.form-textarea{resize:vertical;min-height:60px;}
.type-seg{display:flex;gap:4px;background:rgba(50,60,80,.07);padding:4px;border-radius:8px;margin-top:2px;}
.type-btn{border:none;background:transparent;border-radius:5px;padding:5px 14px;font-size:12.5px;font-weight:600;color:var(--mid);cursor:pointer;transition:background .12s,color .12s;white-space:nowrap;}
.type-btn.sel{background:#fff;color:var(--dark);box-shadow:0 1px 4px rgba(30,40,50,.12);}
/* Multi-select категорий */
.ms-wrap{position:relative;}
.ms-trigger{width:100%;text-align:left;background:rgba(50,60,80,.06);border:1.5px solid transparent;border-radius:7px;padding:8px 12px;font-size:13px;font-family:inherit;color:var(--dark);cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:6px;outline:none;transition:border-color .15s,background .15s;}
.ms-trigger:focus,.ms-trigger.open{border-color:var(--brand);background:#fff;}
.ms-trigger-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--mid);}
.ms-trigger-text.has-val{color:var(--dark);}
.ms-caret{width:14px;height:14px;flex:none;transition:transform .15s;}
.ms-trigger.open .ms-caret{transform:rotate(180deg);}
.ms-menu{position:absolute;top:calc(100% + 3px);left:0;right:0;background:#fff;border:1px solid var(--light);border-radius:8px;box-shadow:var(--sh-hover);z-index:200;display:none;overflow:hidden;}
.ms-menu.open{display:block;}
.ms-list{max-height:180px;overflow-y:auto;}
.ms-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;font-size:13px;color:var(--dark);user-select:none;}
.ms-item:hover{background:rgba(129,180,70,.07);}
.ms-item input[type=checkbox]{width:15px;height:15px;accent-color:var(--brand);cursor:pointer;flex:none;}
.ms-empty{padding:10px 12px;font-size:13px;color:var(--mid);}
.ms-add-row{padding:8px;border-top:1px solid var(--bg);display:flex;gap:6px;}
.ms-add-inp{flex:1;border:1px solid var(--light);border-radius:5px;padding:5px 9px;font-size:12.5px;font-family:inherit;color:var(--dark);outline:none;}
.ms-add-inp:focus{border-color:var(--brand);}
.ms-add-btn{padding:4px 10px;border-radius:5px;border:1.5px solid var(--brand);background:transparent;color:var(--brand);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .12s;}
.ms-add-btn:hover{background:rgba(129,180,70,.07);}
/* Кнопки подвала модала */
.btn-cancel{height:36px;padding:0 18px;border-radius:7px;font-size:13px;font-family:inherit;font-weight:600;color:var(--mid);background:transparent;border:1.5px solid var(--light);cursor:pointer;transition:border-color .12s,color .12s;display:inline-flex;align-items:center;justify-content:center;}
.btn-cancel:hover{border-color:var(--mid);color:var(--dark);}
.btn-save{height:36px;padding:0 20px;border-radius:7px;font-size:13px;font-family:inherit;font-weight:600;color:#fff;background:var(--brand);border:none;cursor:pointer;transition:background .12s;display:inline-flex;align-items:center;justify-content:center;}
.btn-save:hover{background:var(--brand-d);}
.btn-save:disabled{background:var(--mid);cursor:not-allowed;}
/* Toast-уведомление */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;font-size:13px;font-weight:500;padding:10px 20px;border-radius:8px;box-shadow:0 4px 16px rgba(30,40,50,.3);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:2000;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:#991b1b;}
</style>
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <a href="/" class="s-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 18 18"><path d="M9 2L2 6v6l7 4 7-4V6z" opacity=".3"/><path d="M9 2l7 4-7 4L2 6z"/></svg>
      </div>
      <span class="logo-text">IT-innovation</span>
    </a>
    <div class="nav-body" id="navBody">
      <div class="nav-group-label">Загрузка...</div>
    </div>
    <div class="s-footer">
      <div class="user-row">
        <div class="avatar" id="userAvatar">?</div>
        <div class="u-info">
          <div class="u-name" id="userName">...</div>
          <div class="u-role" id="userRole">...</div>
        </div>
        <button class="logout-btn" title="Выйти" id="logoutBtn">&#x23FB;</button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <span class="page-h">Вендоры</span>
      <span class="count-badge" id="countBadge">...</span>
    </div>
    <div class="content">
      <!-- Filters -->
      <div class="filters">
        <input id="searchInput" class="filter-input" type="search" placeholder="Поиск по названию...">
        <select id="catSelect" class="filter-select">
          <option value="">Все категории</option>
        </select>
        <select id="statusSelect" class="filter-select">
          <option value="">Все статусы</option>
          <option value="active">Активный</option>
          <option value="suspended">Приостановлен</option>
          <option value="revoked">Отозван</option>
          <option value="deauth">Деавторизован</option>
          <option value="closed">Закрыт</option>
          <option value="none">Без статуса</option>
          <option value="overdue">Просрочен</option>
        </select>
        <button class="btn-reset" id="resetBtn">Сбросить</button>
        <button class="btn-add" id="btnAdd">+ Добавить</button>
      </div>

      <!-- Cards -->
      <div class="cards-grid" id="cardsGrid">
        <div class="empty-state" style="grid-column:1/-1">Загрузка...</div>
      </div>
    </div>
  </div>
</div>

<script>
const NAV_ICONS = {
  sales:    `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 10l4-4 3 3 5-5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>`,
  presale:  `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a6 6 0 100 12A6 6 0 008 2zm0 1.5a4.5 4.5 0 110 9 4.5 4.5 0 010-9zM7 5v4l3 1.5.5-1L8 8V5H7z"/></svg>`,
  marketing:`<svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 8a5 5 0 0110 0H3zm5-6a1 1 0 110 2 1 1 0 010-2zM2 9h12v1H2z"/></svg>`,
  bidding:  `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1l2 4h4l-3 3 1 4-4-2-4 2 1-4-3-3h4z"/></svg>`,
  logistics:`<svg viewBox="0 0 16 16" fill="currentColor"><path d="M1 4h9v6H1zM10 6h3l2 2v2h-5V6zM3 10a1.5 1.5 0 100 3 1.5 1.5 0 000-3zm8 0a1.5 1.5 0 100 3 1.5 1.5 0 000-3z"/></svg>`,
  docs:     `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 2h7l3 3v9H3V2zm7 0v3h3M6 7h5M6 9h5M6 11h3"/></svg>`,
};
const MODULE_URLS = {sales: '/vendors'};
const STAFF_ICON = `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M5 7a2.5 2.5 0 100-5 2.5 2.5 0 000 5zm-4 7a4 4 0 018 0H1zm9-7a2 2 0 100-4 2 2 0 000 4zm1 1a3 3 0 012.83 2H10a5 5 0 00-.8-2.75A3 3 0 0111 8z"/></svg>`;
function defaultIcon() {
  return `<svg viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="2" width="12" height="12" rx="2" opacity=".3"/><rect x="5" y="5" width="6" height="1.5" rx=".75"/><rect x="5" y="8" width="6" height="1.5" rx=".75"/></svg>`;
}

const TYPE_LABEL = {vendor: 'Вендор', distributor: 'Дистрибьютор', partner: 'Партнёр'};
const TYPE_CLASS = {vendor: 't-vendor', distributor: 't-distributor', partner: 't-partner'};

const STATUS_LABEL = {
  active: 'Активный', suspended: 'Приостановлен', revoked: 'Отозван',
  deauth: 'Деавторизован', closed: 'Закрыт', none: 'Без статуса', overdue: 'Просрочен'
};
const STATUS_CLASS = {
  active: 'badge-active', suspended: 'badge-suspended',
  revoked: 'badge-revoked', deauth: 'badge-deauth', closed: 'badge-closed',
  none: 'badge-none', overdue: 'badge-overdue'
};
const STRIPE_LABEL = {
  active: 'Активный', suspended: 'Приост.', revoked: 'Отозван',
  deauth: 'Деавт.', closed: 'Закрыт', none: 'Нет', overdue: 'Просроч.'
};
const VENDOR_ICON = `<svg width="14" height="14" style="color:rgba(255,255,255,.75);" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>`;

function statusBadge(st) {
  if (!st) return '<span class="badge badge-unknown">-</span>';
  const cls = STATUS_CLASS[st] || 'badge-unknown';
  const lbl = STATUS_LABEL[st] || st;
  return `<span class="badge ${cls}">${lbl}</span>`;
}

function fmtDate(iso) {
  if (!iso) return '-';
  const [y, m, d] = iso.split('-');
  return `${d}.${m}.${y}`;
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let currentFilters = {q: '', category: '', status_type: ''};
let _catOptions = [];   // все категории для мультиселекта
let _catSelected = new Set();
let _modalCtype = 'vendor';
let _navRoles = [];     // role_codes текущего пользователя

function buildUrl(f) {
  const p = new URLSearchParams();
  if (f.q) p.set('q', f.q);
  if (f.category) p.set('category', f.category);
  if (f.status_type) p.set('status_type', f.status_type);
  const s = p.toString();
  return '/api/vendors' + (s ? '?' + s : '');
}

async function loadVendors(filters) {
  const res = await fetch(buildUrl(filters));
  if (res.status === 401) { window.location.href = '/login'; return; }
  const grid = document.getElementById('cardsGrid');
  if (res.status === 403) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">Нет доступа к модулю.</div>';
    return;
  }
  if (!res.ok) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">Ошибка загрузки данных.</div>';
    return;
  }
  const data = await res.json();
  renderCards(data.vendors, data.total);
  if (filters === currentFilters) fillCategorySelect(data.categories);
}

function renderCards(vendors, total) {
  document.getElementById('countBadge').textContent =
    total === vendors.length ? `${total}` : `${vendors.length} из ${total}`;

  const grid = document.getElementById('cardsGrid');
  if (!vendors.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">Нет вендоров по заданным фильтрам.</div>';
    return;
  }

  grid.innerHTML = vendors.map(v => {
    const st = v.status_type || 'unknown';
    const dateStr = fmtDate(v.valid_until);
    const expired = v.valid_until && new Date(v.valid_until) < new Date();
    const stripeLbl = STRIPE_LABEL[st] || st;
    const badgeCls = STATUS_CLASS[st] || 'badge-unknown';
    const badgeLbl = STATUS_LABEL[st] || st;
    const ctype = v.company_type || 'vendor';
    const typeChip = (ctype !== 'vendor')
      ? `<span class="type-chip ${TYPE_CLASS[ctype] || ''}">${TYPE_LABEL[ctype] || ctype}</span>`
      : '';
    const metaLeft = dateStr !== '-'
      ? `<span class="cl-meta${expired ? ' expired' : ''}">${expired ? '&#x26A0;&nbsp;' : ''}до ${dateStr}</span>`
      : '<span class="cl-meta"></span>';
    const metaRight = v.partner_id
      ? `<span class="cl-meta" style="color:var(--slate)">${esc(v.partner_id)}</span>`
      : '';
    const warnIcon = v.has_warning ? '<span class="warn-icon">⚠</span>' : '';
    return `<div class="cl-card s-${st}" onclick="window.location='/vendors/${v.id}'">
      <div class="cl-stripe">
        <div class="cl-stripe-icon">${VENDOR_ICON}</div>
        <span class="cl-stripe-lbl">${stripeLbl}</span>
      </div>
      <div class="cl-content">
        <div class="cl-hd">
          <div class="cl-hd-left">
            <div class="cl-name">${esc(v.name)}${typeChip}</div>
            <div class="cl-sub">${v.categories ? esc(v.categories) : ''}</div>
          </div>
          <span class="badge ${badgeCls} cl-badge">${warnIcon}${badgeLbl}</span>
        </div>
        <div class="cl-ft">
          ${metaLeft}
          ${metaRight}
        </div>
      </div>
    </div>`;
  }).join('');
}

function fillCategorySelect(cats) {
  _catOptions = cats;  // сохраняем для мультиселекта в модале
  const sel = document.getElementById('catSelect');
  const cur = sel.value;
  while (sel.options.length > 1) sel.remove(1);
  cats.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    if (c === cur) opt.selected = true;
    sel.appendChild(opt);
  });
}

// Debounce for search
let searchTimer = null;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    currentFilters = {...currentFilters, q: e.target.value.trim()};
    loadVendors(currentFilters);
  }, 300);
});

document.getElementById('catSelect').addEventListener('change', e => {
  currentFilters = {...currentFilters, category: e.target.value};
  loadVendors(currentFilters);
});

document.getElementById('statusSelect').addEventListener('change', e => {
  currentFilters = {...currentFilters, status_type: e.target.value};
  loadVendors(currentFilters);
});

document.getElementById('resetBtn').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  document.getElementById('catSelect').value = '';
  document.getElementById('statusSelect').value = '';
  currentFilters = {q: '', category: '', status_type: ''};
  loadVendors(currentFilters);
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/logout', {method: 'POST'});
  window.location.href = '/login';
});

async function buildSidebar() {
  const meRes = await fetch('/me');
  if (!meRes.ok) { window.location.href = '/login'; return; }
  const me = await meRes.json();
  if (me.must_change_password) { window.location.href = '/login'; return; }
  document.getElementById('userName').textContent = me.login;
  document.getElementById('userAvatar').textContent = me.login.slice(0,2).toUpperCase();

  const navRes = await fetch('/nav');
  const nav = await navRes.json();
  _navRoles = nav.roles || [];
  document.getElementById('userRole').textContent = _navRoles.join(', ') || 'нет роли';
  if (_navRoles.some(r => r === 'marketer' || r === 'analyst')) {
    document.getElementById('btnAdd').style.display = 'flex';
  }

  const body = document.getElementById('navBody');
  body.innerHTML = '';
  if (!nav.modules.length) {
    body.innerHTML = '<div style="padding:16px 10px;font-size:12.5px;color:rgba(255,255,255,.25)">Модули не назначены.</div>';
    return;
  }
  const label = document.createElement('div');
  label.className = 'nav-group-label';
  label.textContent = 'Модули';
  body.appendChild(label);
  nav.modules.forEach(m => {
    const url = MODULE_URLS[m.code];
    const item = document.createElement(url ? 'a' : 'div');
    item.className = 'nav-item' + (m.code === 'sales' ? ' act' : '');
    if (url) item.href = url;
    item.innerHTML = (NAV_ICONS[m.code] || defaultIcon()) + `<span>${m.name}</span>`;
    body.appendChild(item);
  });
  const staffItem = document.createElement('a');
  staffItem.className = 'nav-item';
  staffItem.href = '/employees';
  staffItem.style.textDecoration = 'none';
  staffItem.innerHTML = STAFF_ICON + '<span>Сотрудники</span>';
  body.appendChild(staffItem);
}

async function init() {
  await buildSidebar();
  setupModalListeners();
  await loadVendors(currentFilters);
}

init();

// ─── Модал создания ────────────────────────────────────────────────────────

function openCreateModal() {
  _modalCtype = 'vendor';
  _catSelected = new Set();
  document.querySelectorAll('.type-btn').forEach(b => {
    b.classList.toggle('sel', b.dataset.ctype === 'vendor');
  });
  // сбросить форму
  ['fName','fStatusText','fValidUntil','fPartnerId','fLegalEntity','fDirections',
   'fPurchaseMethod','fDiscount','fPortalUrl','fPortalLogin','fPortalPassword',
   'fVendorContact','fDealReg','fMopComments'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.value = ''; el.classList.remove('invalid'); }
  });
  document.getElementById('fStatusType').value = '';
  renderCatList();
  updateCatTrigger();
  document.getElementById('createModal').classList.add('open');
  setTimeout(() => document.getElementById('fName').focus(), 50);
}

function closeCreateModal() {
  document.getElementById('createModal').classList.remove('open');
}

// ─── Multi-select категорий (вызываются из openCreateModal, нужны на верхнем уровне) ─────

function renderCatList() {
  const list = document.getElementById('catMsList');
  if (!_catOptions.length) {
    list.innerHTML = '<div class="ms-empty">Нет категорий - добавьте ниже</div>';
    return;
  }
  list.innerHTML = _catOptions.map(c =>
    `<label class="ms-item">
       <input type="checkbox" value="${esc(c)}"${_catSelected.has(c) ? ' checked' : ''}>
       ${esc(c)}
     </label>`
  ).join('');
  list.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', () => {
      if (cb.checked) _catSelected.add(cb.value);
      else _catSelected.delete(cb.value);
      updateCatTrigger();
    });
  });
}

function updateCatTrigger() {
  const txt = document.getElementById('catMsText');
  if (_catSelected.size) {
    txt.textContent = [..._catSelected].join(', ');
    txt.classList.add('has-val');
  } else {
    txt.textContent = 'Выберите категории...';
    txt.classList.remove('has-val');
  }
}

// Вызывается из init() после первого await — к этому моменту DOM уже разобран.
function setupModalListeners() {
  // Оверлей закрывает модал кликом по фону
  document.getElementById('createModal').addEventListener('click', function(e) {
    if (e.target === this) closeCreateModal();
  });
  document.getElementById('modalCloseBtn').addEventListener('click', closeCreateModal);
  document.getElementById('modalCancelBtn').addEventListener('click', closeCreateModal);
  document.getElementById('btnAdd').addEventListener('click', openCreateModal);

  // Тип компании
  document.querySelectorAll('.type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      _modalCtype = btn.dataset.ctype;
      document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('sel', b === btn));
    });
  });

  // Категорий multi-select: trigger и menu
  const catTrigger = document.getElementById('catMsTrigger');
  const catMenu = document.getElementById('catMsMenu');

  catTrigger.addEventListener('click', e => {
    e.stopPropagation();
    const open = catMenu.classList.toggle('open');
    catTrigger.classList.toggle('open', open);
  });
  document.addEventListener('click', () => {
    catMenu.classList.remove('open');
    catTrigger.classList.remove('open');
  });
  catMenu.addEventListener('click', e => e.stopPropagation());

  document.getElementById('catMsAddBtn').addEventListener('click', () => {
    const inp = document.getElementById('catMsAddInp');
    const val = inp.value.trim();
    if (!val) return;
    if (!_catOptions.includes(val)) _catOptions.push(val);
    _catSelected.add(val);
    inp.value = '';
    renderCatList();
    updateCatTrigger();
  });
  document.getElementById('catMsAddInp').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('catMsAddBtn').click(); }
  });

  // Сохранение
  document.getElementById('modalSaveBtn').addEventListener('click', async () => {
    const nameEl = document.getElementById('fName');
    const name = nameEl.value.trim();
    if (!name) {
      nameEl.classList.add('invalid');
      nameEl.focus();
      return;
    }
    nameEl.classList.remove('invalid');

    const body = {
      company_type: _modalCtype,
      name,
      categories: _catSelected.size ? [..._catSelected].join(', ') : null,
      status_type: document.getElementById('fStatusType').value || null,
      status_text: document.getElementById('fStatusText').value.trim() || null,
      valid_until: document.getElementById('fValidUntil').value || null,
      partner_id: document.getElementById('fPartnerId').value.trim() || null,
      legal_entity: document.getElementById('fLegalEntity').value.trim() || null,
      directions: document.getElementById('fDirections').value.trim() || null,
      purchase_method: document.getElementById('fPurchaseMethod').value.trim() || null,
      discount: document.getElementById('fDiscount').value.trim() || null,
      portal_url: document.getElementById('fPortalUrl').value.trim() || null,
      portal_login: document.getElementById('fPortalLogin').value.trim() || null,
      portal_password: document.getElementById('fPortalPassword').value || null,
      vendor_contact: document.getElementById('fVendorContact').value.trim() || null,
      deal_registration: document.getElementById('fDealReg').value.trim() || null,
      mop_comments: document.getElementById('fMopComments').value.trim() || null,
    };

    const saveBtn = document.getElementById('modalSaveBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'Сохраняю...';

    try {
      const r = await fetch('/api/vendors', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body),
      });
      if (r.status === 201) {
        const vendor = await r.json();
        closeCreateModal();
        window.location.href = `/vendors/${vendor.id}`;
      } else if (r.status === 409) {
        showToast('Запись с таким именем уже существует', true);
      } else {
        const err = await r.json().catch(() => ({}));
        showToast(err.detail || 'Ошибка сервера', true);
      }
    } catch {
      showToast('Ошибка сети', true);
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = 'Сохранить';
    }
  });
}

// ─── Toast ───────────────────────────────────────────────────────────────────

function showToast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' err' : '');
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
<!-- Модал: создание вендора/дистрибьютора/партнёра -->
<div class="modal-overlay" id="createModal">
  <div class="modal-box">
    <div class="modal-head">
      <span class="modal-title">Новая запись</span>
      <button class="modal-close" id="modalCloseBtn" aria-label="Закрыть">&#x2715;</button>
    </div>
    <div class="modal-body">
      <!-- Тип -->
      <div class="form-group">
        <div class="form-label">Тип <span class="req">*</span></div>
        <div class="type-seg">
          <button type="button" class="type-btn sel" data-ctype="vendor">Вендор</button>
          <button type="button" class="type-btn" data-ctype="distributor">Дистрибьютор</button>
          <button type="button" class="type-btn" data-ctype="partner">Партнёр</button>
        </div>
      </div>
      <!-- Название -->
      <div class="form-group">
        <label class="form-label" for="fName">Название <span class="req">*</span></label>
        <input class="form-inp" id="fName" type="text" placeholder="Название компании" autocomplete="off">
      </div>
      <!-- Категории -->
      <div class="form-group">
        <div class="form-label">Категории</div>
        <div class="ms-wrap" id="catMsWrap">
          <button type="button" class="ms-trigger" id="catMsTrigger">
            <span class="ms-trigger-text" id="catMsText">Выберите категории...</span>
            <svg class="ms-caret" viewBox="0 0 16 16" fill="none" stroke="#8296AA" stroke-width="2"><polyline points="4 6 8 10 12 6"/></svg>
          </button>
          <div class="ms-menu" id="catMsMenu">
            <div class="ms-list" id="catMsList"></div>
            <div class="ms-add-row">
              <input class="ms-add-inp" id="catMsAddInp" type="text" placeholder="Новая категория...">
              <button type="button" class="ms-add-btn" id="catMsAddBtn">Добавить</button>
            </div>
          </div>
        </div>
      </div>
      <!-- Статус -->
      <div class="form-section">
        <div class="form-section-head">Статус</div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="fStatusType">Тип статуса</label>
            <select class="form-inp" id="fStatusType">
              <option value="">—</option>
              <option value="active">Активный</option>
              <option value="suspended">Приостановлен</option>
              <option value="revoked">Отозван</option>
              <option value="deauth">Деавторизован</option>
              <option value="closed">Закрыт</option>
              <option value="none">Без статуса</option>
            </select>
          </div>
          <div class="form-group" style="flex:2">
            <label class="form-label" for="fStatusText">Статус (текст)</label>
            <input class="form-inp" id="fStatusText" type="text" placeholder="Silver partner / Dealer">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="fValidUntil">Действует до</label>
          <input class="form-inp" id="fValidUntil" type="date">
        </div>
      </div>
      <!-- Реквизиты -->
      <div class="form-section">
        <div class="form-section-head">Реквизиты</div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="fPartnerId">Partner ID</label>
            <input class="form-inp" id="fPartnerId" type="text" autocomplete="off">
          </div>
          <div class="form-group">
            <label class="form-label" for="fLegalEntity">Юрлицо</label>
            <input class="form-inp" id="fLegalEntity" type="text">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="fDirections">Направления</label>
            <input class="form-inp" id="fDirections" type="text">
          </div>
          <div class="form-group">
            <label class="form-label" for="fPurchaseMethod">Схема закупки</label>
            <input class="form-inp" id="fPurchaseMethod" type="text">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="fDiscount">Скидка</label>
          <textarea class="form-inp form-textarea" id="fDiscount" rows="2"></textarea>
        </div>
      </div>
      <!-- Партнёрский портал -->
      <div class="form-section">
        <div class="form-section-head">Партнёрский портал</div>
        <div class="form-group">
          <label class="form-label" for="fPortalUrl">URL</label>
          <input class="form-inp" id="fPortalUrl" type="url" placeholder="https://...">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="fPortalLogin">Логин</label>
            <input class="form-inp" id="fPortalLogin" type="text" autocomplete="off">
          </div>
          <div class="form-group">
            <label class="form-label" for="fPortalPassword">Пароль</label>
            <input class="form-inp" id="fPortalPassword" type="password" autocomplete="new-password">
          </div>
        </div>
      </div>
      <!-- Работа с нами -->
      <div class="form-section">
        <div class="form-section-head">Работа с нами</div>
        <div class="form-group">
          <label class="form-label" for="fVendorContact">Контакт вендора</label>
          <input class="form-inp" id="fVendorContact" type="text">
        </div>
        <div class="form-group">
          <label class="form-label" for="fDealReg">Deal registration</label>
          <input class="form-inp" id="fDealReg" type="text">
        </div>
        <div class="form-group">
          <label class="form-label" for="fMopComments">Заметки МОП</label>
          <textarea class="form-inp form-textarea" id="fMopComments" rows="3"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn-cancel" id="modalCancelBtn">Отмена</button>
      <button type="button" class="btn-save" id="modalSaveBtn">Сохранить</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<button class="scroll-top" id="scrollTop" title="Наверх" aria-label="Прокрутить вверх">
  <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
</button>
<script>
(function(){
  const btn = document.getElementById('scrollTop');
  const scroller = document.querySelector('.content');
  scroller.addEventListener('scroll', function(){
    btn.classList.toggle('visible', scroller.scrollTop > window.innerHeight * 0.5);
  }, {passive:true});
  btn.addEventListener('click', function(){
    scroller.scrollTo({top:0, behavior:'smooth'});
  });
})();
</script>
</body>
