<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вендор - IT-innovation</title>
<style>
:root{
  --brand:#81B446;--brand-d:#6a9338;--dark:#1E2832;--slate:#323C50;
  --mid:#8296AA;--light:#D7DCE6;--bg:#F5FAFA;
  --nav-bg:#1E2832;--nav-hover:#323C50;
  --sidebar-w:232px;--topbar-h:56px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);font-family:'Vela Sans',system-ui,sans-serif;color:var(--dark);-webkit-font-smoothing:antialiased;}
.layout{display:flex;height:100vh;overflow:hidden;}

/* Sidebar */
.sidebar{width:var(--sidebar-w);flex:none;background:var(--nav-bg);display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.05);}
.s-logo{height:var(--topbar-h);display:flex;align-items:center;padding:0 16px;gap:10px;border-bottom:1px solid rgba(255,255,255,.07);flex:none;text-decoration:none;transition:background .12s;}
.s-logo:hover{background:rgba(255,255,255,.05);}
.logo-mark{width:30px;height:30px;border-radius:8px;flex:none;background:var(--brand);display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:16px;height:16px;fill:#fff;}
.logo-text{font-size:14px;font-weight:700;color:#fff;letter-spacing:-.01em;}
.nav-body{flex:1;overflow-y:auto;padding:10px 8px;}
.nav-group-label{font-size:10.5px;font-weight:600;color:rgba(130,150,170,.7);text-transform:uppercase;letter-spacing:.08em;padding:10px 10px 4px;}
.nav-item{display:flex;align-items:center;gap:9px;height:38px;padding:0 10px;border-radius:7px;font-size:13px;font-weight:500;color:rgba(255,255,255,.6);cursor:pointer;margin-bottom:1px;border-left:2px solid transparent;transition:background .12s,color .12s;text-decoration:none;}
.nav-item:hover{background:var(--nav-hover);color:#fff;}
.nav-item.act{background:rgba(129,180,70,.14);color:#fff;border-left-color:var(--brand);}
.nav-item svg{width:16px;height:16px;flex:none;opacity:.7;}
.nav-item.act svg{opacity:1;}
.s-footer{padding:10px 8px;border-top:1px solid rgba(255,255,255,.06);flex:none;}
.user-row{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;}
.user-row:hover{background:var(--nav-hover);}
.avatar{width:30px;height:30px;border-radius:8px;flex:none;background:var(--slate);display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700;color:#fff;}
.u-info{flex:1;min-width:0;}
.u-name{font-size:12.5px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.u-role{font-size:11px;color:var(--mid);}
.logout-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;border-radius:5px;color:rgba(255,255,255,.3);transition:color .15s,background .15s;flex:none;font-size:16px;line-height:1;}
.logout-btn:hover{color:#fff;background:rgba(255,255,255,.08);}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:var(--topbar-h);flex:none;display:flex;align-items:center;padding:0 24px;background:#fff;border-bottom:1px solid var(--light);gap:8px;}
.breadcrumb{font-size:13px;color:var(--mid);}
.breadcrumb a{color:var(--mid);text-decoration:none;}
.breadcrumb a:hover{color:var(--dark);}
.breadcrumb-sep{margin:0 5px;color:var(--light);}
.breadcrumb-cur{color:var(--dark);font-weight:600;}
.content{flex:1;overflow-y:auto;padding:24px;}

/* Card layout */
.vendor-header{background:#fff;border:1px solid var(--light);border-radius:10px;padding:20px 24px;margin-bottom:16px;}
.vh-top{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap;}
.vh-name{font-size:20px;font-weight:700;color:var(--dark);flex:1;min-width:200px;}
.vh-meta{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap;}
.vh-pid{font-size:12px;color:var(--mid);}
.vh-until{font-size:12px;color:var(--mid);}
.vh-until.expired{color:#991b1b;}

/* Sections */
.section{background:#fff;border:1px solid var(--light);border-radius:10px;padding:20px 24px;margin-bottom:16px;}
.section-title{font-size:12px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;}
.fields-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px 24px;}
.field{display:flex;flex-direction:column;gap:3px;}
.field-label{font-size:11px;font-weight:600;color:var(--mid);text-transform:uppercase;letter-spacing:.06em;}
.field-value{font-size:13px;color:var(--dark);word-break:break-word;}
.field-value.empty{color:var(--light);font-style:italic;}
.field-value a{color:var(--brand-d);text-decoration:none;}
.field-value a:hover{text-decoration:underline;}
.field-wide{grid-column:1/-1;}

/* Password field */
.pwd-row{display:flex;align-items:center;gap:8px;}
.pwd-text{font-size:13px;color:var(--dark);font-family:monospace;word-break:break-all;}
.btn-show{height:28px;padding:0 10px;border:1px solid var(--light);border-radius:6px;font-size:12px;font-family:inherit;color:var(--slate);background:#fff;cursor:pointer;flex:none;transition:border-color .12s,color .12s;}
.btn-show:hover{border-color:var(--brand);color:var(--brand);}

/* Distributors table — стиль Зебра */
.dist-wrap{background:#fff;border:1px solid var(--light);border-radius:10px;overflow:hidden;margin-top:4px;}
.dist-table{width:100%;border-collapse:collapse;}
.dist-table thead{background:var(--dark);}
.dist-table th{font-size:11.5px;font-weight:600;color:rgba(255,255,255,.6);text-align:left;padding:10px 14px;}
.dist-table tbody tr:nth-child(odd) td{background:#fff;}
.dist-table tbody tr:nth-child(even) td{background:rgba(245,250,250,.9);}
.dist-table tbody tr:hover td{background:rgba(129,180,70,.06)!important;}
.dist-table td{font-size:13px;padding:11px 14px;vertical-align:top;}

/* Status badges */
.badge{display:inline-block;font-size:11px;font-weight:600;border-radius:5px;padding:3px 10px;}
.badge-active{background:#e8f5d9;color:#4a7a1e;}
.badge-suspended{background:#fef9c3;color:#854d0e;}
.badge-revoked,.badge-deauth,.badge-closed,.badge-overdue{background:#fde8e8;color:#991b1b;}
.badge-none{background:#eef2f7;color:#64748b;}
.badge-unknown{background:#f1f5f9;color:#94a3b8;}

/* Иконка предупреждения */
.warn-icon{display:inline-block;color:#d97706;font-weight:700;margin-right:4px;}

/* Чекбоксы продления */
.renewal-options{display:flex;gap:12px;margin-top:10px;align-items:center;}
.renewal-checkbox{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;}
.renewal-checkbox input{cursor:pointer;accent-color:var(--brand);}
.renewal-checkbox:hover{color:var(--brand);}

.footer-meta{font-size:11.5px;color:var(--mid);margin-top:4px;}
.loading{padding:48px;text-align:center;color:var(--mid);}
.scroll-top{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--slate);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(30,40,50,.3);opacity:0;pointer-events:none;transition:opacity .2s,transform .18s,background .15s;z-index:999;}
.scroll-top.visible{opacity:1;pointer-events:auto;}
.scroll-top:hover{background:var(--dark);transform:translateY(-2px);box-shadow:0 6px 20px rgba(30,40,50,.4);}
.scroll-top svg{width:18px;height:18px;stroke:#fff;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
/* Тип компании */
.type-chip{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:4px;margin-left:8px;vertical-align:middle;}
.t-vendor{background:rgba(129,180,70,.14);color:#3a6320;}
.t-distributor{background:rgba(30,74,168,.1);color:#1e3fa8;}
.t-partner{background:rgba(120,85,0,.1);color:#7a5500;}
/* Кнопки действий карточки */
.card-actions{display:flex;align-items:center;gap:10px;margin-top:16px;padding-top:14px;border-top:1px solid var(--light);}
.btn-card-edit{height:34px;padding:0 16px;border-radius:7px;font-size:13px;font-family:inherit;font-weight:600;color:var(--slate);background:transparent;border:1.5px solid var(--light);cursor:pointer;transition:border-color .12s,color .12s;}
.btn-card-edit:hover{border-color:var(--brand);color:var(--brand);}
.btn-card-delete{height:34px;padding:0 16px;border-radius:7px;font-size:13px;font-family:inherit;font-weight:600;color:#991b1b;background:transparent;border:1.5px solid #fca5a5;cursor:pointer;transition:border-color .12s,background .12s,color .12s;}
.btn-card-delete:hover{border-color:#991b1b;background:#fde8e8;}
.btn-card-audit{height:34px;padding:0 12px;border-radius:7px;font-size:13px;font-family:inherit;font-weight:500;color:var(--mid);background:transparent;border:none;cursor:pointer;transition:color .12s;margin-left:auto;}
.btn-card-audit:hover{color:var(--dark);}
/* Режим редактирования */
.edit-inp{width:100%;background:rgba(50,60,80,.06);border:1.5px solid transparent;border-radius:7px;padding:7px 11px;font-size:13px;font-family:inherit;color:var(--dark);outline:none;transition:border-color .15s,background .15s;}
.edit-inp:focus{border-color:var(--brand);background:#fff;}
.edit-inp.invalid{border-color:#D97706!important;background:#fffbf0;}
.edit-textarea{resize:vertical;min-height:60px;}
.edit-readonly{font-size:13px;color:var(--mid);padding:6px 0;}
.type-seg{display:flex;gap:4px;background:rgba(50,60,80,.07);padding:4px;border-radius:8px;margin-top:2px;width:fit-content;}
.type-btn{border:none;background:transparent;border-radius:5px;padding:5px 14px;font-size:12.5px;font-weight:600;color:var(--mid);cursor:pointer;transition:background .12s,color .12s;white-space:nowrap;}
.type-btn.sel{background:#fff;color:var(--dark);box-shadow:0 1px 4px rgba(30,40,50,.12);}
.edit-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:14px;border-top:1px solid var(--light);}
.btn-save-edit{height:36px;padding:0 20px;border-radius:7px;font-size:13px;font-family:inherit;font-weight:600;color:#fff;background:var(--brand);border:none;cursor:pointer;transition:background .12s;}
.btn-save-edit:hover{background:var(--brand-d);}
.btn-save-edit:disabled{background:var(--mid);cursor:not-allowed;}
.btn-cancel-edit{height:36px;padding:0 18px;border-radius:7px;font-size:13px;font-family:inherit;font-weight:600;color:var(--mid);background:transparent;border:1.5px solid var(--light);cursor:pointer;transition:border-color .12s,color .12s;}
.btn-cancel-edit:hover{border-color:var(--mid);color:var(--dark);}
/* Аудит-лог панель */
.audit-panel{background:#fff;border:1px solid var(--light);border-radius:10px;padding:20px 24px;margin-top:16px;}
.audit-panel-title{font-size:12px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;}
.audit-table{width:100%;border-collapse:collapse;}
.audit-table th{font-size:11px;font-weight:600;color:var(--mid);text-align:left;padding:8px 12px;border-bottom:2px solid var(--light);}
.audit-table td{font-size:12.5px;padding:9px 12px;border-bottom:1px solid var(--bg);vertical-align:top;}
.audit-table tbody tr:last-child td{border-bottom:none;}
.audit-table tbody tr:hover td{background:rgba(129,180,70,.04);}
.a-chip{font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap;}
.a-create{background:#e8f5d9;color:#3a6320;}
.a-update{background:rgba(30,74,168,.1);color:#1e3fa8;}
.a-delete{background:#fde8e8;color:#991b1b;}
.audit-arrow{color:var(--mid);margin:0 4px;}
.audit-empty{font-size:13px;color:var(--mid);padding:12px 0;}
/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;font-size:13px;font-weight:500;padding:10px 20px;border-radius:8px;box-shadow:0 4px 16px rgba(30,40,50,.3);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:2000;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:#991b1b;}
</style>
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <a href="/" class="s-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 18 18"><path d="M9 2L2 6v6l7 4 7-4V6z" opacity=".3"/><path d="M9 2l7 4-7 4L2 6z"/></svg>
      </div>
      <span class="logo-text">IT-innovation</span>
    </a>
    <div class="nav-body" id="navBody">
      <div class="nav-group-label">Загрузка...</div>
    </div>
    <div class="s-footer">
      <div class="user-row">
        <div class="avatar" id="userAvatar">?</div>
        <div class="u-info">
          <div class="u-name" id="userName">...</div>
          <div class="u-role" id="userRole">...</div>
        </div>
        <button class="logout-btn" title="Выйти" id="logoutBtn">&#x23FB;</button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <nav class="breadcrumb">
        <a href="/vendors">Вендоры</a>
        <span class="breadcrumb-sep">/</span>
        <span class="breadcrumb-cur" id="bcName">...</span>
      </nav>
    </div>
    <div class="content" id="mainContent">
      <div class="loading">Загрузка...</div>
    </div>
  </div>
</div>

<script>
const NAV_ICONS = {
  sales:    `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 10l4-4 3 3 5-5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>`,
  presale:  `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a6 6 0 100 12A6 6 0 008 2zm0 1.5a4.5 4.5 0 110 9 4.5 4.5 0 010-9zM7 5v4l3 1.5.5-1L8 8V5H7z"/></svg>`,
  marketing:`<svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 8a5 5 0 0110 0H3zm5-6a1 1 0 110 2 1 1 0 010-2zM2 9h12v1H2z"/></svg>`,
  bidding:  `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1l2 4h4l-3 3 1 4-4-2-4 2 1-4-3-3h4z"/></svg>`,
  logistics:`<svg viewBox="0 0 16 16" fill="currentColor"><path d="M1 4h9v6H1zM10 6h3l2 2v2h-5V6zM3 10a1.5 1.5 0 100 3 1.5 1.5 0 000-3zm8 0a1.5 1.5 0 100 3 1.5 1.5 0 000-3z"/></svg>`,
  docs:     `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 2h7l3 3v9H3V2zm7 0v3h3M6 7h5M6 9h5M6 11h3"/></svg>`,
};
const MODULE_URLS = {sales: '/vendors'};
function defaultIcon() {
  return `<svg viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="2" width="12" height="12" rx="2" opacity=".3"/><rect x="5" y="5" width="6" height="1.5" rx=".75"/><rect x="5" y="8" width="6" height="1.5" rx=".75"/></svg>`;
}

const STATUS_LABEL = {
  active: 'Активный', suspended: 'Приостановлен', revoked: 'Отозван',
  deauth: 'Деавторизован', closed: 'Закрыт', none: 'Без статуса', overdue: 'Просрочен'
};
const STATUS_CLASS = {
  active: 'badge-active', suspended: 'badge-suspended',
  revoked: 'badge-revoked', deauth: 'badge-deauth', closed: 'badge-closed',
  none: 'badge-none', overdue: 'badge-overdue'
};

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return esc(s).replace(/"/g,'&quot;');
}
function fv(s) {
  if (s == null || s === '') return '<span class="field-value empty">-</span>';
  return `<span class="field-value">${esc(s)}</span>`;
}
function fvLink(s) {
  if (!s) return '<span class="field-value empty">-</span>';
  return `<span class="field-value"><a href="${esc(s)}" target="_blank" rel="noopener">${esc(s)}</a></span>`;
}
function fmtDate(iso) {
  if (!iso) return null;
  const [y, m, d] = iso.split('-');
  return `${d}.${m}.${y}`;
}
function isExpired(iso) {
  if (!iso) return false;
  return new Date(iso) < new Date();
}

function renderVendor(v) {
  _vendorData = v;
  const statusCls = STATUS_CLASS[v.status_type] || 'badge-unknown';
  const statusLbl = STATUS_LABEL[v.status_type] || (v.status_type || '-');
  const dateStr = fmtDate(v.valid_until);
  const expired = isExpired(v.valid_until);
  const ctype = v.company_type || 'vendor';
  const typeChip = `<span class="type-chip ${TYPE_CLASS[ctype] || ''}">${TYPE_LABEL[ctype] || ctype}</span>`;
  const showRenewal = _navRoles.some(r => ['marketer', 'analyst'].includes(r));

  // Distributors table
  const distHtml = v.distributors.length ? `
    <div class="dist-wrap">
      <table class="dist-table">
        <thead><tr>
          <th>#</th><th>Название</th><th>Контакт</th><th>Email</th><th>Телефон</th><th>Примечание</th>
        </tr></thead>
        <tbody>${v.distributors.map(d => `
          <tr>
            <td style="color:var(--mid)">${d.sort_order}</td>
            <td><strong>${esc(d.name)}</strong></td>
            <td>${esc(d.contact) || '-'}</td>
            <td>${esc(d.email) || '-'}</td>
            <td>${esc(d.phone) || '-'}</td>
            <td style="color:var(--mid);font-size:12px">${esc(d.note) || '-'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>` : '<p style="font-size:13px;color:var(--mid)">Дистрибьюторы не указаны.</p>';

  document.getElementById('bcName').textContent = v.name;
  document.title = `${v.name} - IT-innovation`;

  // Пароль хранится в переменной — не инжектируется в HTML-атрибут
  _currentPwd = v.portal_password || null;
  pwdVisible = false;
  const hasPwd = !!v.portal_password;

  document.getElementById('mainContent').innerHTML = `
    <!-- Header -->
    <div class="vendor-header">
      <div class="vh-top">
        <div class="vh-name">${esc(v.name)}${typeChip}</div>
        <span class="badge ${statusCls}">
          ${v.has_warning ? '<span class="warn-icon">⚠</span>' : ''}
          ${esc(statusLbl)}
        </span>
      </div>
      <div class="vh-meta">
        ${v.partner_id ? `<span class="vh-pid">ID партнёра: ${esc(v.partner_id)}</span>` : ''}
        ${dateStr ? `<span class="vh-until${expired ? ' expired' : ''}">
          ${expired ? '&#x26A0; ' : ''}Действует до: ${dateStr}
        </span>` : ''}
        ${v.status_text ? `<span style="font-size:12px;color:var(--slate)">${esc(v.status_text)}</span>` : ''}
      </div>
      ${showRenewal && v.valid_until ? `
      <div class="renewal-options">
        <label class="renewal-checkbox">
          <input type="radio" name="renewal_${v.id}" value="yes" ${v.renewal_decision === 'yes' ? 'checked' : ''}>
          Будем продлевать
        </label>
        <label class="renewal-checkbox">
          <input type="radio" name="renewal_${v.id}" value="no" ${v.renewal_decision === 'no' ? 'checked' : ''}>
          Не будем продлевать
        </label>
      </div>` : ''}
    </div>

    <!-- Partnership -->
    <div class="section">
      <div class="section-title">Партнёрство</div>
      <div class="fields-grid">
        <div class="field"><div class="field-label">Категории</div>${fv(v.categories)}</div>
        <div class="field"><div class="field-label">Направления</div>${fv(v.directions)}</div>
        <div class="field"><div class="field-label">Юридическое лицо</div>${fv(v.legal_entity)}</div>
        <div class="field"><div class="field-label">Способ закупки</div>${fv(v.purchase_method)}</div>
        <div class="field field-wide"><div class="field-label">Скидка / условия</div>${fv(v.discount)}</div>
      </div>
    </div>

    <!-- Portal -->
    <div class="section">
      <div class="section-title">Портал вендора</div>
      <div class="fields-grid">
        <div class="field field-wide"><div class="field-label">Ссылка</div>${fvLink(v.portal_url)}</div>
        <div class="field"><div class="field-label">Логин</div>${fv(v.portal_login)}</div>
        <div class="field">
          <div class="field-label">Пароль</div>
          ${hasPwd ? `<div class="pwd-row">
            <span class="pwd-text" id="pwdText">••••••••</span>
            <button class="btn-show" id="pwdToggle" onclick="togglePwd()">Показать</button>
          </div>` : '<span class="field-value empty">-</span>'}
        </div>
      </div>
    </div>

    <!-- Contacts -->
    <div class="section">
      <div class="section-title">Контакты и сделки</div>
      <div class="fields-grid">
        <div class="field"><div class="field-label">Контакт вендора</div>${fv(v.vendor_contact)}</div>
        <div class="field"><div class="field-label">Регистрация сделки</div>${fv(v.deal_registration)}</div>
      </div>
    </div>

    ${v.mop_comments ? `
    <div class="section">
      <div class="section-title">Заметки МОПа</div>
      <p style="font-size:13px;color:var(--dark);line-height:1.6;white-space:pre-wrap">${esc(v.mop_comments)}</p>
    </div>` : ''}

    <!-- Distributors -->
    <div class="section">
      <div class="section-title">Дистрибьюторы</div>
      ${distHtml}
    </div>

    <p class="footer-meta">Обновлено: ${v.updated_at ? v.updated_at.replace('T',' ').slice(0,16) : '-'}</p>
    ${hasAnyWrite() || hasAuditAccess() ? `
    <div class="card-actions">
      ${hasAnyWrite() ? `<button class="btn-card-edit" id="btnEdit" onclick="enterEditMode()">Редактировать</button>` : ''}
      ${hasFullWrite() ? `<button class="btn-card-delete" onclick="deleteVendor()">Удалить</button>` : ''}
      ${hasAuditAccess() ? `<button class="btn-card-audit" id="btnAudit" onclick="toggleAudit()">Посмотреть историю</button>` : ''}
    </div>` : ''}
  `;
}

let pwdVisible = false;
let _currentPwd = null;
let _navRoles = [];
let _vendorData = null;
const VENDOR_ID = window.location.pathname.split('/').pop();

const TYPE_LABEL = {vendor: 'Вендор', distributor: 'Дистрибьютор', partner: 'Партнёр'};
const TYPE_CLASS = {vendor: 't-vendor', distributor: 't-distributor', partner: 't-partner'};
const _FULL_WRITE_ROLES = new Set(['marketer', 'analyst']);
const _ROP_WRITE_ROLES  = new Set(['rop']);
const _AUDIT_ROLES      = new Set(['marketer', 'analyst']);

function hasFullWrite()  { return _navRoles.some(r => _FULL_WRITE_ROLES.has(r)); }
function hasAnyWrite()   { return _navRoles.some(r => _FULL_WRITE_ROLES.has(r) || _ROP_WRITE_ROLES.has(r)); }
function hasAuditAccess(){ return _navRoles.some(r => _AUDIT_ROLES.has(r)); }
function togglePwd() {
  pwdVisible = !pwdVisible;
  document.getElementById('pwdText').textContent = pwdVisible ? _currentPwd : '••••••••';
  document.getElementById('pwdToggle').textContent = pwdVisible ? 'Скрыть' : 'Показать';
}

async function buildSidebar() {
  const meRes = await fetch('/me');
  if (!meRes.ok) { window.location.href = '/login'; return; }
  const me = await meRes.json();
  document.getElementById('userName').textContent = me.login;
  document.getElementById('userAvatar').textContent = me.login.slice(0,2).toUpperCase();

  const navRes = await fetch('/nav');
  const nav = await navRes.json();
  _navRoles = nav.roles || [];
  document.getElementById('userRole').textContent = _navRoles.join(', ') || 'нет роли';

  const body = document.getElementById('navBody');
  body.innerHTML = '';
  const label = document.createElement('div');
  label.className = 'nav-group-label';
  label.textContent = 'Модули';
  body.appendChild(label);
  nav.modules.forEach(m => {
    const url = MODULE_URLS[m.code];
    const item = document.createElement(url ? 'a' : 'div');
    item.className = 'nav-item' + (m.code === 'sales' ? ' act' : '');
    if (url) item.href = url;
    item.innerHTML = (NAV_ICONS[m.code] || defaultIcon()) + `<span>${m.name}</span>`;
    body.appendChild(item);
  });
}

async function loadVendor() {
  const id = window.location.pathname.split('/').pop();
  const res = await fetch(`/api/vendors/${id}`);
  if (res.status === 401) { window.location.href = '/login'; return; }
  if (res.status === 403) {
    document.getElementById('mainContent').innerHTML = '<div class="loading">Нет доступа к модулю.</div>';
    return;
  }
  if (res.status === 404) {
    document.getElementById('mainContent').innerHTML = '<div class="loading">Вендор не найден.</div>';
    return;
  }
  if (!res.ok) {
    document.getElementById('mainContent').innerHTML = '<div class="loading">Ошибка загрузки.</div>';
    return;
  }
  renderVendor(await res.json());
}

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/logout', {method: 'POST'});
  window.location.href = '/login';
});

async function init() {
  await buildSidebar();
  await loadVendor();
}

init();

// ─── Редактирование ──────────────────────────────────────────────────────────

function enterEditMode() {
  const v = _vendorData;
  const full = hasFullWrite();

  // Поле: для полного доступа - input, для ROP - read-only
  const inp = (id, val, type='text') =>
    full ? `<input class="edit-inp" id="${id}" type="${type}" value="${escAttr(val || '')}">`
         : `<span class="edit-readonly">${esc(val) || '-'}</span>`;
  const area = (id, val) =>
    full ? `<textarea class="edit-inp edit-textarea" id="${id}">${esc(val || '')}</textarea>`
         : `<span class="edit-readonly" style="white-space:pre-wrap">${esc(val) || '-'}</span>`;
  const inpRop = (id, val) =>
    `<input class="edit-inp" id="${id}" type="text" value="${escAttr(val || '')}">`;

  // Сегмент типа
  const typeOpts = ['vendor','distributor','partner'];
  const typeSeg = full
    ? `<div class="type-seg" id="editTypeSeg">${typeOpts.map(t =>
        `<button type="button" class="type-btn${v.company_type === t ? ' sel' : ''}" data-ctype="${t}">${TYPE_LABEL[t]}</button>`
       ).join('')}</div>`
    : `<span class="edit-readonly">${TYPE_LABEL[v.company_type] || v.company_type}</span>`;

  document.getElementById('mainContent').innerHTML = `
    <div class="vendor-header">
      <div class="section-title" style="margin-bottom:16px">Редактирование${!full ? ' (ограниченный доступ)' : ''}</div>
      <div class="fields-grid">
        <div class="field"><div class="field-label">Тип</div>${typeSeg}</div>
        <div class="field"><div class="field-label">Название *</div>
          ${full ? `<input class="edit-inp" id="eName" type="text" value="${escAttr(v.name)}">`
                 : `<span class="edit-readonly">${esc(v.name)}</span>`}
        </div>
        <div class="field"><div class="field-label">Категории</div>${inp('eCategories', v.categories)}</div>
        <div class="field"><div class="field-label">Статус (тип)</div>
          ${full ? `<select class="edit-inp" id="eStatusType">
            <option value="">—</option>
            ${['active','suspended','revoked','deauth','closed','none','overdue'].map(s =>
              `<option value="${s}"${v.status_type === s ? ' selected' : ''}>${STATUS_LABEL[s]||s}</option>`
            ).join('')}
          </select>` : `<span class="edit-readonly">${STATUS_LABEL[v.status_type] || '-'}</span>`}
        </div>
        <div class="field" style="flex:2"><div class="field-label">Статус (текст)</div>${inp('eStatusText', v.status_text)}</div>
        <div class="field"><div class="field-label">Действует до</div>
          ${full ? `<input class="edit-inp" id="eValidUntil" type="date" value="${esc(v.valid_until || '')}">`
                 : `<span class="edit-readonly">${fmtDate(v.valid_until) || '-'}</span>`}
        </div>
        <div class="field"><div class="field-label">Partner ID</div>${inp('ePartnerId', v.partner_id)}</div>
        <div class="field"><div class="field-label">Юрлицо</div>${inp('eLegalEntity', v.legal_entity)}</div>
        <div class="field"><div class="field-label">Направления</div>${inp('eDirections', v.directions)}</div>
        <div class="field"><div class="field-label">Схема закупки</div>${inp('ePurchaseMethod', v.purchase_method)}</div>
        <div class="field field-wide"><div class="field-label">Скидка / условия</div>${area('eDiscount', v.discount)}</div>
        <div class="field field-wide"><div class="field-label">URL портала</div>
          ${full ? `<input class="edit-inp" id="ePortalUrl" type="url" value="${esc(v.portal_url || '')}" placeholder="https://...">`
                 : `<span class="edit-readonly">${esc(v.portal_url) || '-'}</span>`}
        </div>
        <div class="field"><div class="field-label">Логин портала</div>${inp('ePortalLogin', v.portal_login)}</div>
        <div class="field"><div class="field-label">Пароль портала</div>
          ${full ? `<input class="edit-inp" id="ePortalPassword" type="password" autocomplete="new-password" placeholder="Оставьте пустым, чтобы не менять">`
                 : '<span class="edit-readonly">-</span>'}
        </div>
        <div class="field"><div class="field-label">Контакт вендора</div>${inpRop('eVendorContact', v.vendor_contact)}</div>
        <div class="field"><div class="field-label">Deal registration</div>${inpRop('eDealReg', v.deal_registration)}</div>
        ${full ? `<div class="field field-wide"><div class="field-label">Заметки МОП</div>${area('eMopComments', v.mop_comments)}</div>` : ''}
      </div>
      <div class="edit-actions">
        <button class="btn-cancel-edit" onclick="cancelEdit()">Отмена</button>
        <button class="btn-save-edit" id="btnSaveEdit" onclick="saveEdit()">Сохранить</button>
      </div>
    </div>
  `;

  // Тип-сегмент (только full)
  if (full) {
    document.querySelectorAll('#editTypeSeg .type-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#editTypeSeg .type-btn').forEach(b => b.classList.toggle('sel', b === btn));
      });
    });
  }
}

function cancelEdit() {
  renderVendor(_vendorData);
}

async function saveEdit() {
  const saveBtn = document.getElementById('btnSaveEdit');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Сохраняю...'; }
  try {
    const full = hasFullWrite();
    const g = id => { const el = document.getElementById(id); return el ? el.value : null; };
    const gs = id => { const raw = g(id); return raw !== null ? raw.trim() || null : null; };

    if (full) {
      const nameEl = document.getElementById('eName');
      if (!nameEl) throw new Error('Поле "Название" не найдено — попробуйте перезагрузить страницу');
      if (!nameEl.value.trim()) {
        nameEl.classList.add('invalid');
        nameEl.focus();
        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Сохранить'; }
        return;
      }
      nameEl.classList.remove('invalid');
    }

    let body = {};
    if (full) {
      const selType = document.querySelector('#editTypeSeg .type-btn.sel');
      body = {
        company_type: selType ? selType.dataset.ctype : _vendorData.company_type,
        name: (g('eName') || '').trim(),
        categories: gs('eCategories'),
        status_type: g('eStatusType') || null,
        status_text: gs('eStatusText'),
        valid_until: g('eValidUntil') || null,
        partner_id: gs('ePartnerId'),
        legal_entity: gs('eLegalEntity'),
        directions: gs('eDirections'),
        purchase_method: gs('ePurchaseMethod'),
        discount: gs('eDiscount'),
        portal_url: gs('ePortalUrl'),
        portal_login: gs('ePortalLogin'),
        mop_comments: gs('eMopComments'),
      };
      const pwd = g('ePortalPassword');
      if (pwd) body.portal_password = pwd;
    }

    // Renewal decision (только если показывали чекбоксы)
    const renewalRadio = document.querySelector(`input[name="renewal_${VENDOR_ID}"]:checked`);
    if (renewalRadio) {
      body.renewal_decision = renewalRadio.value;
    }

    body.vendor_contact = gs('eVendorContact');
    body.deal_registration = gs('eDealReg');

    const r = await fetch(`/api/vendors/${VENDOR_ID}`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    if (r.ok) {
      _vendorData = await r.json();
      renderVendor(_vendorData);
      showToast('Изменения сохранены');
    } else if (r.status === 409) {
      showToast('Вендор с таким именем уже существует', true);
    } else {
      const err = await r.json().catch(() => ({}));
      showToast(err.detail || 'Ошибка сервера', true);
    }
  } catch (err) {
    console.error('saveEdit:', err);
    showToast(err.message || 'Ошибка при сохранении', true);
  } finally {
    const btn = document.getElementById('btnSaveEdit');
    if (btn) { btn.disabled = false; btn.textContent = 'Сохранить'; }
  }
}

// ─── Удаление ───────────────────────────────────────────────────────────────

async function deleteVendor() {
  const name = _vendorData ? _vendorData.name : 'эту запись';
  if (!confirm(`Удалить "${name}"? Это действие нельзя отменить.`)) return;
  try {
    const r = await fetch(`/api/vendors/${VENDOR_ID}`, {method: 'DELETE'});
    if (r.status === 204) {
      window.location.href = '/vendors';
    } else {
      const err = await r.json().catch(() => ({}));
      showToast(err.detail || 'Ошибка удаления', true);
    }
  } catch {
    showToast('Ошибка сети', true);
  }
}

// ─── Аудит ──────────────────────────────────────────────────────────────────

let _auditVisible = false;

async function toggleAudit() {
  if (_auditVisible) {
    const panel = document.getElementById('auditPanel');
    if (panel) panel.remove();
    _auditVisible = false;
    document.getElementById('btnAudit').textContent = 'Посмотреть историю';
    return;
  }
  const btn = document.getElementById('btnAudit');
  btn.textContent = 'Загружаю...';
  try {
    const r = await fetch(`/api/vendors/${VENDOR_ID}/audit`);
    if (!r.ok) { showToast('Ошибка загрузки истории', true); btn.textContent = 'Посмотреть историю'; return; }
    const rows = await r.json();
    renderAuditPanel(rows);
    _auditVisible = true;
    btn.textContent = 'Скрыть историю';
  } catch {
    showToast('Ошибка сети', true);
    btn.textContent = 'Посмотреть историю';
  }
}

function renderAuditPanel(rows) {
  const ACLS = {create:'a-create',update:'a-update',delete:'a-delete'};
  const ALBL = {create:'Создание',update:'Изменение',delete:'Удаление'};

  const rowsHtml = rows.length ? rows.map(r => {
    const datePart = r.created_at ? r.created_at.replace('T',' ').slice(0,16) : '-';
    let change = '';
    if (r.action === 'update' && r.field_label) {
      const old = r.old_value != null ? esc(r.old_value) : '<em style="color:var(--mid)">пусто</em>';
      const nw  = r.new_value != null ? esc(r.new_value) : '<em style="color:var(--mid)">пусто</em>';
      change = `<strong>${esc(r.field_label)}</strong><span class="audit-arrow">→</span>${old} <span class="audit-arrow">➝</span> ${nw}`;
    } else if (r.action === 'create') {
      change = 'Запись создана';
    } else if (r.action === 'delete') {
      change = 'Запись удалена';
    }
    return `<tr>
      <td><span class="a-chip ${ACLS[r.action]||''}">${ALBL[r.action]||r.action}</span></td>
      <td style="font-size:12px">${change}</td>
      <td style="color:var(--mid);white-space:nowrap">${esc(r.user_login)}</td>
      <td style="color:var(--mid);white-space:nowrap;font-size:12px">${datePart}</td>
    </tr>`;
  }).join('') : `<tr><td colspan="4" class="audit-empty">История пуста</td></tr>`;

  const panel = document.createElement('div');
  panel.className = 'audit-panel';
  panel.id = 'auditPanel';
  panel.innerHTML = `
    <div class="audit-panel-title">История изменений</div>
    <table class="audit-table">
      <thead><tr>
        <th>Действие</th><th>Изменение</th><th>Кто</th><th>Когда</th>
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>`;
  document.getElementById('mainContent').appendChild(panel);
}

// ─── Toast ───────────────────────────────────────────────────────────────────

function showToast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' err' : '');
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
<div class="toast" id="toast"></div>
<button class="scroll-top" id="scrollTop" title="Наверх" aria-label="Прокрутить вверх">
  <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
</button>
<script>
(function(){
  const btn = document.getElementById('scrollTop');
  const scroller = document.querySelector('.content');
  scroller.addEventListener('scroll', function(){
    btn.classList.toggle('visible', scroller.scrollTop > window.innerHeight * 0.5);
  }, {passive:true});
  btn.addEventListener('click', function(){
    scroller.scrollTo({top:0, behavior:'smooth'});
  });
})();
</script>
