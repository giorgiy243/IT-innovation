<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ротация клиентов - IT-innovation</title>
<style>
:root{
  --brand:#81B446;--brand-d:#6a9338;--dark:#1E2832;--slate:#323C50;
  --mid:#8296AA;--light:#D7DCE6;--bg:#F5FAFA;
  --nav-bg:#1E2832;--nav-hover:#323C50;
  --sidebar-w:232px;--topbar-h:56px;
  --sh:0 2px 10px rgba(30,40,50,.08),0 1px 3px rgba(30,40,50,.05);
  --sh-hover:0 8px 28px rgba(30,40,50,.13),0 2px 6px rgba(30,40,50,.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);font-family:'Vela Sans',system-ui,sans-serif;color:var(--dark);-webkit-font-smoothing:antialiased;}
.layout{display:flex;height:100vh;overflow:hidden;}

/* Sidebar */
.sidebar{width:var(--sidebar-w);flex:none;background:var(--nav-bg);display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.05);}
.s-logo{height:var(--topbar-h);display:flex;align-items:center;padding:0 16px;gap:10px;border-bottom:1px solid rgba(255,255,255,.07);flex:none;text-decoration:none;transition:background .12s;}
.s-logo:hover{background:rgba(255,255,255,.05);}
.logo-mark{width:30px;height:30px;border-radius:8px;flex:none;background:var(--brand);display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:16px;height:16px;fill:#fff;}
.logo-text{font-size:14px;font-weight:700;color:#fff;letter-spacing:-.01em;}
.nav-body{flex:1;overflow-y:auto;padding:10px 8px;}
.nav-group-label{font-size:10.5px;font-weight:600;color:rgba(130,150,170,.7);text-transform:uppercase;letter-spacing:.08em;padding:10px 10px 4px;}
.nav-item{display:flex;align-items:center;gap:9px;height:38px;padding:0 10px;border-radius:7px;font-size:13px;font-weight:500;color:rgba(255,255,255,.6);cursor:pointer;margin-bottom:1px;border-left:2px solid transparent;transition:background .12s,color .12s;text-decoration:none;}
.nav-item:hover{background:var(--nav-hover);color:#fff;}
.nav-item.act{background:rgba(129,180,70,.14);color:#fff;border-left-color:var(--brand);}
.nav-item svg{width:16px;height:16px;flex:none;opacity:.7;}
.nav-item.act svg{opacity:1;}
.s-footer{padding:10px 8px;border-top:1px solid rgba(255,255,255,.06);flex:none;}
.user-row{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;}
.user-row:hover{background:var(--nav-hover);}
.avatar{width:30px;height:30px;border-radius:8px;flex:none;background:var(--slate);display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700;color:#fff;}
.u-info{flex:1;min-width:0;}
.u-name{font-size:12.5px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.u-role{font-size:11px;color:var(--mid);}
.logout-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;border-radius:5px;color:rgba(255,255,255,.3);transition:color .15s,background .15s;flex:none;font-size:16px;line-height:1;}
.logout-btn:hover{color:#fff;background:rgba(255,255,255,.08);}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:var(--topbar-h);flex:none;display:flex;align-items:center;padding:0 24px;background:#fff;border-bottom:1px solid var(--light);gap:12px;}
.page-h{font-size:15px;font-weight:700;color:var(--dark);}
.count-badge{font-size:12px;color:var(--mid);background:var(--bg);border:1px solid var(--light);border-radius:20px;padding:2px 10px;}
.scope-badge{font-size:11px;color:var(--slate);background:rgba(129,180,70,.12);border-radius:20px;padding:2px 10px;font-weight:600;}
.btn-export{margin-left:auto;height:34px;padding:0 16px;border-radius:7px;font-size:13px;font-family:inherit;font-weight:600;color:#fff;background:var(--brand);border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:background .12s;}
.btn-export:hover{background:var(--brand-d);}
.btn-export svg{width:15px;height:15px;}
/* Вторичная выгрузка (для МОП) - контурная, рядом с основной «в 1С». */
.btn-export.sec{margin-left:8px;background:#fff;color:var(--brand-d);border:1px solid var(--brand);}
.btn-export.sec:hover{background:rgba(129,180,70,.08);}
/* Второстепенные действия рядом с выгрузкой: «Все» (перевыпуск) и журнал. */
.btn-export-link{margin-left:8px;height:34px;padding:0 10px;border:none;background:none;color:var(--mid);font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;border-radius:7px;text-decoration:none;transition:color .12s,background .12s;}
.btn-export-link:hover{color:var(--dark);background:var(--bg);}
.content{flex:1;overflow-y:auto;padding:20px 24px;}

/* Filters */
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.filters-hint{font-size:12px;color:var(--mid);}
#resetBtn{margin-left:auto;}
.btn-reset{height:34px;padding:0 14px;border:1px solid var(--light);border-radius:7px;font-size:13px;font-family:inherit;color:var(--mid);background:#fff;cursor:pointer;transition:border-color .12s,color .12s;display:inline-flex;align-items:center;justify-content:center;}
.btn-reset:hover{border-color:var(--mid);color:var(--dark);}

/* Table */
.table-wrap{background:#fff;border-radius:10px;box-shadow:var(--sh);overflow:hidden;}
table.cr{width:100%;border-collapse:collapse;font-size:13px;}
table.cr thead th{background:var(--bg);color:var(--slate);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;text-align:center;padding:8px 12px;border-bottom:1px solid var(--light);white-space:nowrap;vertical-align:top;position:sticky;top:0;z-index:2;}
table.cr thead th.num{text-align:center;}
/* Заголовки шапки - все по центру. Данные столбца «Клиент» (2-й) - по левому краю. */
table.cr tbody td:nth-child(2){text-align:left;}
.th-t{margin-bottom:6px;}
.th-f{width:100%;min-width:0;height:28px;border:1px solid var(--light);border-radius:6px;padding:0 7px;font-size:12px;font-family:inherit;font-weight:400;text-transform:none;letter-spacing:normal;color:var(--dark);background:#fff;outline:none;}
/* Зауженные колонки: «Скоринг» и «Клиент» (~40% уже прежнего). */
.col-score{width:66px;}
.col-client{width:200px;}
table.cr thead th:first-child,
table.cr tbody td:first-child{padding-left:8px;padding-right:8px;}
.th-f:focus{border-color:var(--brand);}
.th-f.th-num{text-align:left;padding-right:7px;}
select.th-f{cursor:pointer;padding:0 4px;}

/* Мультиселект (несколько сотрудников) */
.ms{position:relative;width:100%;}
.ms-btn{width:100%;height:28px;display:flex;align-items:center;gap:4px;border:1px solid var(--light);border-radius:6px;padding:0 7px;font-size:12px;font-family:inherit;font-weight:400;text-transform:none;letter-spacing:normal;color:var(--dark);background:#fff;cursor:pointer;outline:none;text-align:left;}
.ms-btn:focus{border-color:var(--brand);}
.ms.ms-has .ms-btn{border-color:var(--brand);background:rgba(129,180,70,.06);}
.ms-label{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--mid);}
.ms.ms-has .ms-label{color:var(--dark);font-weight:500;}
.ms-caret{flex:none;font-size:9px;color:var(--mid);}
.ms-panel{display:none;position:fixed;z-index:100;background:#fff;border:1px solid var(--light);border-radius:8px;box-shadow:var(--sh-hover);width:240px;max-height:320px;flex-direction:column;overflow:hidden;}
.ms.open .ms-panel{display:flex;}
.ms-search{padding:8px;border-bottom:1px solid var(--bg);flex:none;}
.ms-search input{width:100%;height:30px;border:1px solid var(--light);border-radius:6px;padding:0 8px;font-size:12px;font-family:inherit;outline:none;}
.ms-search input:focus{border-color:var(--brand);}
.ms-options{overflow-y:auto;padding:4px;flex:1;}
.ms-opt{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;font-size:12.5px;color:var(--dark);cursor:pointer;text-transform:none;letter-spacing:normal;font-weight:400;}
.ms-opt:hover{background:var(--bg);}
.ms-opt input{flex:none;width:15px;height:15px;cursor:pointer;accent-color:var(--brand);}
.ms-opt span{flex:1;min-width:0;white-space:normal;word-break:break-word;}
.ms-empty{padding:12px;text-align:center;color:var(--mid);font-size:12px;}
.ms-foot{padding:6px 8px;border-top:1px solid var(--bg);flex:none;display:flex;justify-content:flex-end;}
.ms-clear{background:none;border:none;font-family:inherit;font-size:12px;color:var(--brand-d);cursor:pointer;padding:4px 6px;border-radius:5px;font-weight:600;}
.ms-clear:hover{background:var(--bg);}
table.cr tbody td{padding:9px 12px;border-bottom:1px solid var(--bg);vertical-align:middle;text-align:center;}
table.cr tbody tr{cursor:pointer;transition:background .1s;}
table.cr tbody tr:hover{background:rgba(129,180,70,.06);}
table.cr tbody tr:last-child td{border-bottom:none;}
.c-name{font-weight:600;color:var(--dark);}
.c-inn{font-size:11px;color:var(--mid);margin-top:1px;}
.c-num{font-variant-numeric:tabular-nums;}
.c-score{font-weight:700;color:var(--brand-d);font-variant-numeric:tabular-nums;}
.c-mgr{color:var(--slate);white-space:nowrap;}
.c-days{font-variant-numeric:tabular-nums;color:var(--slate);}
.c-days.warn{color:#b45309;font-weight:600;}
.assigned-pill{font-size:11.5px;color:#3a6320;background:rgba(129,180,70,.14);border-radius:5px;padding:2px 8px;white-space:nowrap;}
/* Метка факта передачи рядом с принимающим МОП */
.handed-mark{display:inline-block;margin-left:6px;font-size:11px;font-weight:600;color:#2F7D52;white-space:nowrap;}
.pending-mark{display:inline-block;margin-left:6px;font-size:11px;font-weight:600;color:#b45309;white-space:nowrap;}
.hf-label{font-size:12px;color:var(--slate);display:inline-flex;align-items:center;gap:6px;}

/* Инлайн-редактирование статуса и принимающего прямо в строке */
td.cell-status,td.cell-assigned{cursor:pointer;}
td.cell-status::after,td.cell-assigned::after{content:'\25BE';font-size:9px;color:var(--mid);margin-left:5px;opacity:.45;}
td.cell-status:hover,td.cell-assigned:hover{background:rgba(129,180,70,.12);}
td.cell-status:has(select)::after,td.cell-assigned:has(select)::after{content:none;}
.inline-sel{height:28px;max-width:100%;border:1px solid var(--brand);border-radius:6px;padding:0 6px;font-size:12px;font-family:inherit;color:var(--dark);background:#fff;outline:none;cursor:pointer;}
.assign-empty{color:var(--mid);}

/* Badges */
.badge{display:inline-block;font-size:11px;font-weight:600;border-radius:5px;padding:2px 8px;white-space:nowrap;}
.badge-active{background:#e8f5d9;color:#4a7a1e;}
.badge-progress{background:#fef9c3;color:#854d0e;}
.badge-transfer{background:#dbeafe;color:#1e40af;}
.badge-none{background:#eef2f7;color:#64748b;}

.empty-state{padding:48px;text-align:center;color:var(--mid);font-size:14px;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(30,40,50,.55);display:none;align-items:center;justify-content:center;z-index:1000;}
.modal-overlay.open{display:flex;}
.modal-box{background:#fff;border-radius:12px;width:600px;max-width:96vw;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(30,40,50,.28);}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--light);display:flex;align-items:flex-start;flex:none;gap:8px;}
.modal-title{font-size:15px;font-weight:700;color:var(--dark);flex:1;}
.modal-sub{font-size:12px;color:var(--mid);margin-top:2px;}
/* Состав холдинга в карточке: ЮЛ-члены столбиком, на 2 пункта меньше имени (15->13px). */
.modal-holding{margin-top:8px;}
.mh-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--mid);margin-bottom:3px;}
.mh-item{font-size:13px;color:var(--slate);line-height:1.5;}
.mh-link{cursor:pointer;color:var(--brand-d);width:fit-content;}
.mh-link:hover{text-decoration:underline;}
.mh-link:focus{outline:2px solid var(--brand);outline-offset:1px;border-radius:3px;}
/* Число компаний в холдинге рядом с названием (в таблице) */
.holding-count{color:var(--mid);font-weight:500;}
.modal-close{width:30px;height:30px;border:none;background:transparent;cursor:pointer;border-radius:6px;font-size:18px;color:var(--mid);display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s;line-height:1;flex:none;}
.modal-close:hover{background:var(--bg);color:var(--dark);}
.modal-body{flex:1;overflow-y:auto;padding:20px;}
.modal-foot{padding:14px 20px;border-top:1px solid var(--light);display:flex;align-items:center;justify-content:flex-end;gap:10px;flex:none;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 18px;margin-bottom:18px;}
.info-cell{min-width:0;}
.info-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--mid);margin-bottom:2px;}
.info-val{font-size:13px;color:var(--dark);word-break:break-word;}
.info-block{margin-bottom:14px;}
.info-block .info-val{line-height:1.5;}
.form-section-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--mid);margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--bg);}
.form-group{margin-bottom:12px;}
.form-row{display:flex;gap:12px;}
.form-row .form-group{flex:1;margin-bottom:0;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--slate);margin-bottom:4px;}
.form-inp{width:100%;background:rgba(50,60,80,.06);border:1.5px solid transparent;border-radius:7px;padding:8px 12px;font-size:13px;font-family:inherit;color:var(--dark);outline:none;transition:border-color .15s,background .15s;}
.form-inp:focus{border-color:var(--brand);background:#fff;}
.form-textarea{resize:vertical;min-height:54px;}
.btn-cancel{height:36px;padding:0 18px;border-radius:7px;font-size:13px;font-family:inherit;font-weight:600;color:var(--mid);background:transparent;border:1.5px solid var(--light);cursor:pointer;transition:border-color .12s,color .12s;display:inline-flex;align-items:center;justify-content:center;}
.btn-cancel:hover{border-color:var(--mid);color:var(--dark);}
.btn-save{height:36px;padding:0 20px;border-radius:7px;font-size:13px;font-family:inherit;font-weight:600;color:#fff;background:var(--brand);border:none;cursor:pointer;transition:background .12s;display:inline-flex;align-items:center;justify-content:center;}
.btn-save:hover{background:var(--brand-d);}
.btn-save:disabled{background:var(--mid);cursor:not-allowed;}

/* Toast */
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;font-size:13px;font-weight:500;padding:10px 20px;border-radius:8px;box-shadow:0 4px 16px rgba(30,40,50,.3);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:2000;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:#991b1b;}
</style>
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <a href="/" class="s-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 18 18"><path d="M9 2L2 6v6l7 4 7-4V6z" opacity=".3"/><path d="M9 2l7 4-7 4L2 6z"/></svg>
      </div>
      <span class="logo-text">IT-innovation</span>
    </a>
    <div class="nav-body" id="navBody">
      <div class="nav-group-label">Загрузка...</div>
    </div>
    <div class="s-footer">
      <div class="user-row" title="Личный кабинет" onclick="window.location.href='/profile'">
        <div class="avatar" id="userAvatar">?</div>
        <div class="u-info">
          <div class="u-name" id="userName">...</div>
          <div class="u-role" id="userRole">...</div>
        </div>
        <button class="logout-btn" title="Выйти" id="logoutBtn">&#x23FB;</button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <span class="page-h">Ротация клиентов</span>
      <span class="count-badge" id="countBadge">...</span>
      <span class="scope-badge" id="scopeBadge"></span>
      <span class="count-badge" id="handedBadge"></span>
      <button class="btn-export" id="btnExport" title="Выгрузить назначения в 1С">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1v8m0 0L5 6m3 3l3-3M2 12v2h12v-2"/></svg>
        Выгрузка в 1С
      </button>
      <button class="btn-export sec" id="btnExportMop" title="Скачать досье для МОП (только новые) и зафиксировать передачу">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1v8m0 0L5 6m3 3l3-3M2 12v2h12v-2"/></svg>
        Выгрузка для МОП
      </button>
      <button class="btn-export-link" id="btnExportMopAll" title="Перевыпустить досье по всем назначенным (журнал для уже переданных не меняется)">Все</button>
      <a class="btn-export-link" href="/client-rotation/handovers" title="Журнал передач: какой клиент, какому МОП и когда">Журнал передач</a>
    </div>
    <div class="content">
      <div class="filters">
        <span class="filters-hint">Фильтры по столбцам - в шапке таблицы. Числовые поля фильтруют «от и больше».</span>
        <label class="hf-label">Передача:
          <select id="handedFilter" class="th-f" data-f="handed" style="width:auto;min-width:150px;">
            <option value="">Все</option>
            <option value="handed">Переданные</option>
            <option value="pending">Назначен, не передан</option>
            <option value="unassigned">Не назначен</option>
          </select>
        </label>
        <button class="btn-reset" id="resetBtn">Сбросить фильтры</button>
      </div>

      <div class="table-wrap">
        <table class="cr">
          <colgroup>
            <col class="col-score">
            <col class="col-client">
            <col><col><col><col><col><col>
          </colgroup>
          <thead>
            <tr>
              <th class="num">
                <div class="th-t">Скоринг</div>
                <input type="number" min="0" class="th-f th-num" data-f="score" placeholder="от">
              </th>
              <th>
                <div class="th-t">Клиент</div>
                <input type="search" class="th-f" data-f="name" placeholder="Название или ИНН">
              </th>
              <th>
                <div class="th-t">Текущий менеджер</div>
                <div class="ms" id="msManager">
                  <button type="button" class="ms-btn"><span class="ms-label">Все</span><span class="ms-caret">&#x25BE;</span></button>
                  <div class="ms-panel">
                    <div class="ms-search"><input type="text" placeholder="Найти МОП..."></div>
                    <div class="ms-options"></div>
                    <div class="ms-foot"><button type="button" class="ms-clear">Очистить</button></div>
                  </div>
                </div>
              </th>
              <th class="num">
                <div class="th-t">Без контакта</div>
                <input type="number" min="0" class="th-f th-num" data-f="days_no_contact" placeholder="от">
              </th>
              <th class="num">
                <div class="th-t">Без КП</div>
                <input type="number" min="0" class="th-f th-num" data-f="days_no_kp" placeholder="от">
              </th>
              <th class="num">
                <div class="th-t">Без отгрузки</div>
                <input type="number" min="0" class="th-f th-num" data-f="days_no_shipment" placeholder="от">
              </th>
              <th>
                <div class="th-t">Статус</div>
                <select class="th-f" data-f="transfer_status">
                  <option value="">Все</option>
                  <option value="active">Активный</option>
                  <option value="progress">В работе</option>
                  <option value="transfer">На передачу</option>
                  <option value="__none__">Не задан</option>
                </select>
              </th>
              <th>
                <div class="th-t">Принимающий</div>
                <div class="ms" id="msAssigned">
                  <button type="button" class="ms-btn"><span class="ms-label">Все</span><span class="ms-caret">&#x25BE;</span></button>
                  <div class="ms-panel">
                    <div class="ms-search"><input type="text" placeholder="Найти..."></div>
                    <div class="ms-options"></div>
                    <div class="ms-foot"><button type="button" class="ms-clear">Очистить</button></div>
                  </div>
                </div>
              </th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="8" class="empty-state">Загрузка...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Модал назначения -->
<div class="modal-overlay" id="assignModal">
  <div class="modal-box">
    <div class="modal-head">
      <div style="flex:1;min-width:0">
        <div class="modal-title" id="mTitle">Клиент</div>
        <div class="modal-sub" id="mSub"></div>
        <div class="modal-holding" id="mHolding" style="display:none"></div>
      </div>
      <button class="modal-close" id="mCloseBtn" aria-label="Закрыть">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="info-grid" id="mInfoGrid"></div>
      <div class="info-block" id="mSummaryBlock" style="display:none">
        <div class="info-lbl">Сводка</div>
        <div class="info-val" id="mSummary"></div>
      </div>

      <div class="form-section-head">Решение по ротации</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="mManager">Принимающий менеджер</label>
          <select class="form-inp" id="mManager"><option value="">— не назначен —</option></select>
        </div>
        <div class="form-group">
          <label class="form-label" for="mStatus">Статус передачи</label>
          <select class="form-inp" id="mStatus">
            <option value="">—</option>
            <option value="active">Активный</option>
            <option value="progress">В работе</option>
            <option value="transfer">На передачу</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="mComment">Комментарий</label>
        <textarea class="form-inp form-textarea" id="mComment" rows="2"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn-cancel" id="mCancelBtn">Отмена</button>
      <button type="button" class="btn-save" id="mSaveBtn">Сохранить</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ─── Навигация (sidebar) ───────────────────────────────────────────────────
const STAFF_ICON = `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M5 7a2.5 2.5 0 100-5 2.5 2.5 0 000 5zm-4 7a4 4 0 018 0H1zm9-7a2 2 0 100-4 2 2 0 000 4zm1 1a3 3 0 012.83 2H10a5 5 0 00-.8-2.75A3 3 0 0111 8z"/></svg>`;
const NAV_ICONS = {
  sales:    `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 10l4-4 3 3 5-5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>`,
  client_rotation:`<svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 110 14A7 7 0 018 1zm0 1.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zm1.5 5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z"/></svg>`,
};
function defaultIcon(){return `<svg viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="2" width="12" height="12" rx="2" opacity=".3"/><rect x="5" y="5" width="6" height="1.5" rx=".75"/><rect x="5" y="8" width="6" height="1.5" rx=".75"/></svg>`;}
const MODULE_URLS = {sales:'/vendors', client_rotation:'/client-rotation'};

const STATUS_LABEL = {active:'Активный', progress:'В работе', transfer:'На передачу'};
const STATUS_CLASS = {active:'badge-active', progress:'badge-progress', transfer:'badge-transfer'};

// current_manager и assigned_to - массивы (мультивыбор), остальные - скаляры.
function emptyFilters(){
  return {
    score:null, name:'', current_manager:[],
    days_no_contact:null, days_no_kp:null, days_no_shipment:null,
    transfer_status:'', assigned_to:[], handed:'',
  };
}
let _filters = emptyFilters();
let _allClients = [];
let _managers = [];
const _multiSelects = [];

function esc(s){
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function statusBadge(st){
  if (!st) return '<span class="badge badge-none">-</span>';
  const cls = STATUS_CLASS[st] || 'badge-none';
  return `<span class="badge ${cls}">${esc(STATUS_LABEL[st] || st)}</span>`;
}
function daysCell(v){
  if (v === null || v === undefined) return '<td class="c-days">-</td>';
  const warn = v >= 90 ? ' warn' : '';
  return `<td class="c-days${warn}">${v}</td>`;
}

async function buildSidebar(){
  const meRes = await fetch('/me');
  if (!meRes.ok){ window.location.href='/login'; return; }
  const me = await meRes.json();
  if (me.must_change_password){ window.location.href='/login'; return; }
  document.getElementById('userName').textContent = me.login;
  document.getElementById('userAvatar').textContent = me.login.slice(0,2).toUpperCase();

  const nav = await (await fetch('/nav')).json();
  document.getElementById('userRole').textContent = (nav.roles||[]).join(', ') || 'нет роли';
  const body = document.getElementById('navBody');
  body.innerHTML = '';
  const label = document.createElement('div');
  label.className = 'nav-group-label';
  label.textContent = 'Модули';
  body.appendChild(label);
  (nav.modules||[]).forEach(m => {
    const url = MODULE_URLS[m.code];
    const item = document.createElement(url ? 'a' : 'div');
    item.className = 'nav-item' + (m.code === 'client_rotation' ? ' act' : '');
    if (url){ item.href = url; item.style.textDecoration = 'none'; }
    item.innerHTML = (NAV_ICONS[m.code] || defaultIcon()) + `<span>${esc(m.name)}</span>`;
    body.appendChild(item);
  });
  const staff = document.createElement('a');
  staff.className = 'nav-item';
  staff.href = '/employees';
  staff.style.textDecoration = 'none';
  staff.innerHTML = STAFF_ICON + '<span>Сотрудники</span>';
  body.appendChild(staff);
}

// ─── Список клиентов ───────────────────────────────────────────────────────
// Грузим всех видимых клиентов один раз, фильтруем по столбцам на клиенте -
// мгновенно и по любому полю шапки (датасет в пределах scope невелик).
async function loadClients(){
  const body = document.getElementById('tableBody');
  const res = await fetch('/api/client-rotation/clients');
  if (res.status === 401){ window.location.href='/login'; return; }
  if (res.status === 403){ body.innerHTML = '<tr><td colspan="8" class="empty-state">Нет доступа к модулю.</td></tr>'; return; }
  if (!res.ok){ body.innerHTML = '<tr><td colspan="8" class="empty-state">Ошибка загрузки.</td></tr>'; return; }
  const data = await res.json();
  _allClients = data.clients || [];
  document.getElementById('scopeBadge').textContent = 'Видимость: ' + (data.scope || '-');
  populateFilterOptions();
  applyFilters();
  updateHandedBadge();
}

// Уникальные непустые значения поля по всем клиентам, отсортированные по-русски.
function distinctSorted(key){
  const s = new Set();
  _allClients.forEach(c => { const v = c[key]; if (v) s.add(v); });
  return [...s].sort((a, b) => String(a).localeCompare(String(b), 'ru'));
}

// Мультиселект с чекбоксами и поиском. Выбор хранится в _filters[key] (массив).
// opts: {field - поле данных для значений, includeNone - опция «не назначен»,
// noneLabel - её подпись}.
function setupMultiSelect(rootId, key, opts){
  const root = document.getElementById(rootId);
  const btn = root.querySelector('.ms-btn');
  const panel = root.querySelector('.ms-panel');
  const label = root.querySelector('.ms-label');
  const box = root.querySelector('.ms-options');
  const search = root.querySelector('.ms-search input');
  const clearBtn = root.querySelector('.ms-clear');

  function renderLabel(){
    const sel = _filters[key];
    if (!sel.length){ label.textContent = 'Все'; root.classList.remove('ms-has'); return; }
    root.classList.add('ms-has');
    if (sel.length === 1){
      label.textContent = sel[0] === '__none__' ? (opts.noneLabel || 'Не назначен') : sel[0];
    } else {
      label.textContent = sel.length + ' выбрано';
    }
  }
  function buildOptions(){
    const sel = new Set(_filters[key]);
    const items = [];
    if (opts.includeNone) items.push({v:'__none__', t: opts.noneLabel || 'Не назначен'});
    distinctSorted(opts.field).forEach(v => items.push({v, t:v}));
    const q = (search.value || '').trim().toLowerCase();
    box.innerHTML = items
      .filter(it => !q || it.t.toLowerCase().includes(q))
      .map(it => `<label class="ms-opt"><input type="checkbox" value="${esc(it.v)}"${sel.has(it.v) ? ' checked' : ''}><span>${esc(it.t)}</span></label>`)
      .join('') || '<div class="ms-empty">Ничего не найдено</div>';
  }
  function positionPanel(){
    const r = btn.getBoundingClientRect();
    const pw = 240;
    let left = r.left;
    if (left + pw > window.innerWidth - 8) left = Math.max(8, window.innerWidth - pw - 8);
    panel.style.left = left + 'px';
    panel.style.top = (r.bottom + 4) + 'px';
  }
  function open(){
    closeAllMultiSelects(root);
    search.value = '';
    buildOptions();
    positionPanel();
    root.classList.add('open');
    search.focus();
  }
  function close(){ root.classList.remove('open'); }

  btn.addEventListener('click', e => {
    e.stopPropagation();
    root.classList.contains('open') ? close() : open();
  });
  panel.addEventListener('click', e => e.stopPropagation());
  search.addEventListener('input', buildOptions);
  box.addEventListener('change', e => {
    if (e.target.type !== 'checkbox') return;
    const v = e.target.value;
    const arr = _filters[key].slice();
    const i = arr.indexOf(v);
    if (e.target.checked){ if (i < 0) arr.push(v); }
    else if (i >= 0){ arr.splice(i, 1); }
    _filters = {..._filters, [key]: arr};
    renderLabel();
    applyFilters();
  });
  clearBtn.addEventListener('click', () => {
    _filters = {..._filters, [key]: []};
    buildOptions(); renderLabel(); applyFilters();
  });

  const api = {
    refresh(){ if (root.classList.contains('open')) buildOptions(); renderLabel(); },
    reset(){ close(); renderLabel(); },
  };
  _multiSelects.push(api);
  return api;
}
function closeAllMultiSelects(except){
  document.querySelectorAll('.ms.open').forEach(el => { if (el !== except) el.classList.remove('open'); });
}

function populateFilterOptions(){
  _multiSelects.forEach(ms => ms.refresh());
}

function applyFilters(){
  const f = _filters;
  let rows = _allClients;
  if (f.name){
    const n = f.name.toLowerCase();
    rows = rows.filter(c => (c.name || '').toLowerCase().includes(n) || String(c.inn || '').includes(f.name));
  }
  if (f.score != null) rows = rows.filter(c => c.score != null && c.score >= f.score);
  if (f.current_manager.length){
    const set = new Set(f.current_manager);
    rows = rows.filter(c => set.has(c.current_manager || ''));
  }
  if (f.days_no_contact != null) rows = rows.filter(c => c.days_no_contact != null && c.days_no_contact >= f.days_no_contact);
  if (f.days_no_kp != null) rows = rows.filter(c => c.days_no_kp != null && c.days_no_kp >= f.days_no_kp);
  if (f.days_no_shipment != null) rows = rows.filter(c => c.days_no_shipment != null && c.days_no_shipment >= f.days_no_shipment);
  if (f.transfer_status){
    rows = f.transfer_status === '__none__'
      ? rows.filter(c => !c.transfer_status)
      : rows.filter(c => c.transfer_status === f.transfer_status);
  }
  if (f.assigned_to.length){
    const set = new Set(f.assigned_to);
    rows = rows.filter(c => set.has(c.assigned_to ? c.assigned_to : '__none__'));
  }
  if (f.handed === 'handed') rows = rows.filter(c => c.handed_over_at);
  else if (f.handed === 'pending') rows = rows.filter(c => c.assigned_to && !c.handed_over_at);
  else if (f.handed === 'unassigned') rows = rows.filter(c => !c.assigned_to);
  renderTable(rows, _allClients.length);
}

// Дата ISO -> ДД.ММ.ГГГГ для бейджа передачи.
function fmtDate(iso){
  if (!iso) return '';
  const d = new Date(iso);
  return String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + d.getFullYear();
}

// «Передано N · Ожидает M» по всем видимым клиентам (в пределах scope).
function updateHandedBadge(){
  const handed = _allClients.filter(c => c.handed_over_at).length;
  const pending = _allClients.filter(c => c.assigned_to && !c.handed_over_at).length;
  document.getElementById('handedBadge').textContent = `Передано ${handed} · Ожидает ${pending}`;
}

function renderTable(clients, total){
  document.getElementById('countBadge').textContent =
    total === clients.length ? `${total}` : `${clients.length} из ${total}`;
  const body = document.getElementById('tableBody');
  if (!clients.length){
    body.innerHTML = '<tr><td colspan="8" class="empty-state">Нет клиентов по заданным фильтрам.</td></tr>';
    return;
  }
  body.innerHTML = clients.map((c, i) => `
    <tr data-idx="${i}">
      <td class="c-score">${c.score ?? '-'}</td>
      <td>
        <div class="c-name">${esc(c.name)}${holdingCount(c)}</div>
        <div class="c-inn">${c.inn ? 'ИНН '+esc(c.inn) : 'без ИНН'}</div>
      </td>
      <td class="c-mgr">${esc(c.current_manager) || '-'}</td>
      ${daysCell(c.days_no_contact)}
      ${daysCell(c.days_no_kp)}
      ${daysCell(c.days_no_shipment)}
      <td class="cell-status" title="Нажмите, чтобы изменить статус">${statusBadge(c.transfer_status)}</td>
      <td class="cell-assigned" title="Нажмите, чтобы назначить принимающего">${assignedDisplay(c)}</td>
    </tr>`).join('');
  // Клик по строке -> модал; клик по ячейкам статуса/принимающего -> инлайн-выбор.
  body.querySelectorAll('tr[data-idx]').forEach(tr => {
    const c = clients[+tr.dataset.idx];
    tr.addEventListener('click', () => openAssign(c));
    const stTd = tr.querySelector('.cell-status');
    stTd.addEventListener('click', e => { e.stopPropagation(); if (!stTd.querySelector('select')) editStatus(stTd, c); });
    const asTd = tr.querySelector('.cell-assigned');
    asTd.addEventListener('click', e => { e.stopPropagation(); if (!asTd.querySelector('select')) editAssigned(asTd, c); });
  });
}

// Состав холдинга: ЮЛ-члены (без головы) и счётчик «(всего ЮЛ)» включая голову.
function holdingMembers(c){
  return Array.isArray(c.holding_members) ? c.holding_members : [];
}
function memberName(m){ return (m && m.name) ? m.name : m; }
function holdingCount(c){
  const m = holdingMembers(c);
  return (c.is_holding_head && m.length)
    ? ` <span class="holding-count">(${m.length + 1})</span>`
    : '';
}

function assignedDisplay(c){
  if (!c.assigned_to) return '<span class="assign-empty">-</span>';
  const pill = `<span class="assigned-pill">${esc(c.assigned_to)}</span>`;
  if (c.handed_over_at){
    return pill + `<span class="handed-mark" title="Передан ${esc(c.handed_over_to || c.assigned_to)} ${fmtDate(c.handed_over_at)}">&#x2713; ${fmtDate(c.handed_over_at)}</span>`;
  }
  return pill + '<span class="pending-mark" title="Назначен, ещё не передан (не было выгрузки)">ожидает</span>';
}

// Инлайн-редактор: подменяет ячейку на select, по выбору сохраняет в БД и
// возвращает отрисовку. Объект client - ссылка из _allClients, обновляем на месте.
function editStatus(td, client){
  const cur = client.transfer_status || '';
  const opts = [['', '—'], ['active', 'Активный'], ['progress', 'В работе'], ['transfer', 'На передачу']];
  if (cur && !opts.some(([v]) => v === cur)) opts.push([cur, cur]); // сохранить нестандартный статус
  const sel = document.createElement('select');
  sel.className = 'inline-sel';
  opts.forEach(([v, t]) => {
    const o = document.createElement('option');
    o.value = v; o.textContent = t; if (v === cur) o.selected = true;
    sel.appendChild(o);
  });
  mountInlineEditor(td, sel, async () => {
    const nv = sel.value || null;
    if (nv === cur) return false;            // без изменений
    if (await saveField(client, {transfer_status: nv})){ client.transfer_status = nv; }
    return true;
  }, () => statusBadge(client.transfer_status));
}

function editAssigned(td, client){
  const curId = client.assigned_to_employee_id;
  const sel = document.createElement('select');
  sel.className = 'inline-sel';
  const none = document.createElement('option');
  none.value = ''; none.textContent = '— не назначен —';
  sel.appendChild(none);
  let found = false;
  _managers.forEach(m => {
    const o = document.createElement('option');
    o.value = m.employee_id; o.textContent = m.crm_name;
    if (curId === m.employee_id){ o.selected = true; found = true; }
    sel.appendChild(o);
  });
  if (!found && curId != null){            // назначен уволенному/отсутствующему - не потерять
    const o = document.createElement('option');
    o.value = curId; o.textContent = client.assigned_to || ('#' + curId); o.selected = true;
    sel.appendChild(o);
  }
  mountInlineEditor(td, sel, async () => {
    const nv = sel.value ? parseInt(sel.value, 10) : null;
    if (nv === (curId ?? null)) return false;
    if (await saveField(client, {assigned_to_employee_id: nv})){
      client.assigned_to_employee_id = nv;
      const m = _managers.find(x => x.employee_id === nv);
      client.assigned_to = m ? m.crm_name : (nv != null ? client.assigned_to : null);
      // Переназначение -> новый МОП ещё не получал выгрузку: метка передачи сбрасывается.
      client.handed_over_at = null; client.handed_over_to = null;
      updateHandedBadge();
    }
    return true;
  }, () => assignedDisplay(client));
}

// Общая обвязка инлайн-селекта: монтирует, фокусирует, по change сохраняет,
// по blur без изменений возвращает прежний вид. Защита от двойного завершения.
function mountInlineEditor(td, sel, onCommit, render){
  td.innerHTML = '';
  td.appendChild(sel);
  sel.focus();
  try { sel.showPicker(); } catch { /* не во всех браузерах - тогда откроется по клику */ }
  let done = false;
  const finish = async (commit) => {
    if (done) return;
    done = true;
    if (commit) await onCommit();
    td.innerHTML = render();
  };
  sel.addEventListener('change', () => finish(true));
  sel.addEventListener('blur', () => finish(false));
}

async function saveField(client, patch){
  const body = {company_id: client.company_id, ...patch};
  try {
    const r = await fetch('/api/client-rotation/assignments', {
      method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body),
    });
    if (r.ok){ showToast('Сохранено'); return true; }
    const err = await r.json().catch(() => ({}));
    showToast(err.detail || 'Ошибка сохранения', true);
    return false;
  } catch {
    showToast('Ошибка сети', true);
    return false;
  }
}

// ─── Модал назначения ──────────────────────────────────────────────────────
let _modalClient = null;
let _modalStack = [];   // стек карточек: переход к ЮЛ холдинга открывает карточку поверх

function infoCell(lbl, val){
  if (val === null || val === undefined || val === '') return '';
  return `<div class="info-cell"><div class="info-lbl">${esc(lbl)}</div><div class="info-val">${esc(val)}</div></div>`;
}

// Открыть карточку. stacked=true - поверх текущей (переход к ЮЛ холдинга),
// закрытие вернёт к предыдущей; иначе - новый стек с одной карточкой.
function openAssign(c, stacked){
  if (!stacked) _modalStack = [];
  _modalStack.push(c);
  renderModalCard(c);
  document.getElementById('assignModal').classList.add('open');
}

function renderModalCard(c){
  _modalClient = c;
  document.getElementById('mTitle').textContent = c.name;
  document.getElementById('mSub').textContent = (c.inn ? 'ИНН '+c.inn : 'без ИНН') + (c.city ? ' · '+c.city : '');
  // Состав холдинга под наименованием: остальные ЮЛ столбиком (только у головы).
  const hold = document.getElementById('mHolding');
  const members = holdingMembers(c);
  if (c.is_holding_head && members.length){
    hold.style.display = 'block';
    hold.innerHTML = '<div class="mh-label">Ещё в холдинге</div>'
      + members.map(m => {
          const k = (m && m.key) ? String(m.key) : '';
          const nm = esc(memberName(m));
          return k
            ? `<div class="mh-item mh-link" data-key="${esc(k)}" role="button" tabindex="0">${nm}</div>`
            : `<div class="mh-item">${nm}</div>`;
        }).join('');
  } else {
    hold.style.display = 'none';
    hold.innerHTML = '';
  }
  const grid = document.getElementById('mInfoGrid');
  grid.innerHTML = [
    infoCell('Скоринг', c.score),
    infoCell('Текущий менеджер', c.current_manager),
    infoCell('Телефон', c.v_contact_phone || c.phone),
    infoCell('Контактное лицо', c.v_contact_name || c.contact_person),
    infoCell('Email', c.email),
    infoCell('Сайт', c.site),
    infoCell('Отрасль', c.activity || c.industry),
    infoCell('Сотрудников', c.employees),
    infoCell('ДСП', c.dsp_info),
    infoCell('СП', c.sp_info),
  ].join('');
  const sumBlock = document.getElementById('mSummaryBlock');
  const summary = c.summary_llm || c.summary || c.recommendation;
  if (summary){
    document.getElementById('mSummary').textContent = summary;
    sumBlock.style.display = 'block';
  } else {
    sumBlock.style.display = 'none';
  }
  // форма
  fillManagerSelect();
  document.getElementById('mManager').value = '';
  document.getElementById('mStatus').value = c.transfer_status || '';
  document.getElementById('mComment').value = c.comment || '';
}
// Закрытие: если есть карточка под текущей (стек) - вернуться к ней, иначе закрыть.
function closeAssign(){
  _modalStack.pop();
  if (_modalStack.length){
    renderModalCard(_modalStack[_modalStack.length - 1]);
  } else {
    document.getElementById('assignModal').classList.remove('open');
    _modalClient = null;
  }
}

// Переход к компании холдинга по клику: догружаем её карточку и открываем поверх.
async function openHoldingMember(key){
  if (!key) return;
  try {
    const r = await fetch('/api/client-rotation/client?key=' + encodeURIComponent(key));
    if (!r.ok){ showToast('Компания не найдена', true); return; }
    openAssign(await r.json(), true);
  } catch {
    showToast('Ошибка сети', true);
  }
}

function fillManagerSelect(){
  const sel = document.getElementById('mManager');
  while (sel.options.length > 1) sel.remove(1);
  _managers.forEach(m => {
    const o = document.createElement('option');
    o.value = m.employee_id;
    o.textContent = m.crm_name;
    sel.appendChild(o);
  });
}

async function loadManagers(){
  const res = await fetch('/api/client-rotation/managers');
  if (res.ok) _managers = await res.json();
}

async function saveAssign(){
  if (!_modalClient) return;
  const empVal = document.getElementById('mManager').value;
  const body = {
    company_id: _modalClient.company_id,
    assigned_to_employee_id: empVal ? parseInt(empVal, 10) : null,
    transfer_status: document.getElementById('mStatus').value || null,
    comment: document.getElementById('mComment').value.trim() || null,
  };
  const btn = document.getElementById('mSaveBtn');
  btn.disabled = true; btn.textContent = 'Сохраняю...';
  try {
    const r = await fetch('/api/client-rotation/assignments', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body),
    });
    if (r.ok){
      closeAssign();
      showToast('Сохранено');
      await loadClients();
    } else {
      const err = await r.json().catch(() => ({}));
      showToast(err.detail || 'Ошибка сохранения', true);
    }
  } catch {
    showToast('Ошибка сети', true);
  } finally {
    btn.disabled = false; btn.textContent = 'Сохранить';
  }
}

// ─── Export ────────────────────────────────────────────────────────────────
async function exportXlsx(){
  const btn = document.getElementById('btnExport');
  btn.disabled = true;
  try {
    const r = await fetch('/api/client-rotation/export');
    if (!r.ok){ showToast('Ошибка выгрузки', true); return; }
    const blob = await r.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '1c_export.zip';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(a.href);
  } finally {
    btn.disabled = false;
  }
}

// Выгрузка для МОП: POST -> ZIP (файл на каждого МОП). Скачивание ФИКСИРУЕТ
// передачу: mode=new берёт только не переданных текущему МОП и пишет их в журнал;
// mode=all перевыпускает все назначенные (без новых записей для уже переданных).
async function exportMop(mode){
  const ids = ['btnExportMop', 'btnExportMopAll'];
  ids.forEach(id => { const b = document.getElementById(id); if (b) b.disabled = true; });
  try {
    const r = await fetch('/api/client-rotation/export-managers?mode=' + (mode || 'new'), {method: 'POST'});
    if (!r.ok){ showToast('Ошибка выгрузки', true); return; }
    const blob = await r.blob();
    const d = new Date();
    const pad = n => String(n).padStart(2, '0');
    const stamp = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'rotation_managers_' + stamp + '.zip';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(a.href);
    if (mode !== 'all') await loadClients();  // обновить бейджи передачи в таблице
  } finally {
    ids.forEach(id => { const b = document.getElementById(id); if (b) b.disabled = false; });
  }
}

// ─── Toast ─────────────────────────────────────────────────────────────────
function showToast(msg, isErr=false){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' err' : '');
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── Слушатели и init ──────────────────────────────────────────────────────
// Привязка фильтров шапки: текст/число - input с дебаунсом, select - change.
document.querySelectorAll('.th-f').forEach(el => {
  const key = el.dataset.f;
  const isNum = el.type === 'number';
  const read = () => {
    if (isNum) return el.value === '' ? null : Number(el.value);
    if (el.tagName === 'SELECT') return el.value;
    return el.value.trim();
  };
  if (el.tagName === 'SELECT'){
    el.addEventListener('change', () => { _filters = {..._filters, [key]: read()}; applyFilters(); });
  } else {
    let t = null;
    el.addEventListener('input', () => {
      clearTimeout(t);
      t = setTimeout(() => { _filters = {..._filters, [key]: read()}; applyFilters(); }, 250);
    });
  }
});
document.getElementById('resetBtn').addEventListener('click', () => {
  document.querySelectorAll('.th-f').forEach(el => { el.value = ''; });
  _filters = emptyFilters();
  _multiSelects.forEach(ms => ms.reset());
  applyFilters();
});

// Мультиселекты сотрудников + закрытие по клику вне/прокрутке/ресайзу.
setupMultiSelect('msManager', 'current_manager', {field:'current_manager'});
setupMultiSelect('msAssigned', 'assigned_to', {field:'assigned_to', includeNone:true, noneLabel:'Не назначен'});
document.addEventListener('click', () => closeAllMultiSelects(null));
document.querySelector('.content').addEventListener('scroll', () => closeAllMultiSelects(null));
window.addEventListener('resize', () => closeAllMultiSelects(null));
document.getElementById('btnExport').addEventListener('click', exportXlsx);
document.getElementById('btnExportMop').addEventListener('click', () => exportMop('new'));
document.getElementById('btnExportMopAll').addEventListener('click', () => exportMop('all'));
document.getElementById('mCloseBtn').addEventListener('click', closeAssign);
document.getElementById('mCancelBtn').addEventListener('click', closeAssign);
document.getElementById('mSaveBtn').addEventListener('click', saveAssign);
document.getElementById('assignModal').addEventListener('click', function(e){ if (e.target === this) closeAssign(); });
document.getElementById('mHolding').addEventListener('click', e => {
  const item = e.target.closest('.mh-link');
  if (item) openHoldingMember(item.getAttribute('data-key'));
});
document.getElementById('mHolding').addEventListener('keydown', e => {
  if (e.key !== 'Enter' && e.key !== ' ') return;
  const item = e.target.closest('.mh-link');
  if (item){ e.preventDefault(); openHoldingMember(item.getAttribute('data-key')); }
});
document.getElementById('logoutBtn').addEventListener('click', async (e) => {
  e.stopPropagation();
  await fetch('/logout', {method:'POST'}); window.location.href='/login';
});

async function init(){
  await buildSidebar();
  await loadManagers();
  await loadClients();
}
init();
</script>
